<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏢 Agent Office</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #a8c8e8;
  background-image:
    radial-gradient(ellipse 400px 120px at 20% 15%, rgba(255,255,255,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 300px 90px at 65% 8%, rgba(255,255,255,0.45) 0%, transparent 70%),
    radial-gradient(ellipse 250px 80px at 85% 20%, rgba(255,255,255,0.35) 0%, transparent 70%);
  min-height: 100vh;
  padding: 24px 16px 48px;
}

h1 {
  font-family: 'Arial Black', 'Impact', sans-serif;
  font-size: 2.2rem;
  text-align: center;
  color: #1a1a2e;
  text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

/* ============================================================
   SCENE WRAPPER
   ============================================================ */
.scene-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 28px;
}

.scene {
  position: relative;
  width: 900px;
  height: 500px;
  overflow: hidden;
  border: 3.5px solid #000;
  box-shadow: 6px 6px 0 #000, 0 0 0 1px #333;
  border-radius: 4px;
}

/* ============================================================
   BREAK ROOM (top portion)
   ============================================================ */
.break-room {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 135px;
  background: #d4e8c4;
  border-bottom: 3px solid #000;
  z-index: 1;
}

/* ceiling strip */
.ceiling {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 16px;
  background: #e8f4e0;
  border-bottom: 2px solid #b0caa0;
}

/* ceiling lights */
.ceiling-light {
  position: absolute;
  top: 3px;
  width: 48px; height: 10px;
  background: #fff9c4;
  border: 2px solid #ccc080;
  border-radius: 3px;
  box-shadow: 0 0 10px rgba(255,240,100,0.6), 0 0 20px rgba(255,240,100,0.3);
}
.ceiling-light:nth-child(1) { left: 180px; }
.ceiling-light:nth-child(2) { left: 430px; }
.ceiling-light:nth-child(3) { left: 680px; }

/* window */
.window {
  position: absolute;
  top: 24px;
  right: 30px;
  width: 68px;
  height: 62px;
  background: linear-gradient(180deg, #b8d8f8 0%, #e4f0ff 100%);
  border: 3px solid #000;
  border-radius: 2px;
  overflow: hidden;
}
.window::before {
  content: '';
  position: absolute;
  top: 50%; left: 0; right: 0;
  height: 2px;
  background: #000;
}
.window::after {
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 2px;
  background: #000;
}
.window-sun {
  position: absolute;
  top: 6px; right: 6px;
  width: 14px; height: 14px;
  background: #ffd700;
  border: 2px solid #b8860b;
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(255,215,0,0.7);
}

/* plant */
.plant {
  position: absolute;
  top: 28px;
  left: 28px;
}
.plant-pot {
  width: 20px; height: 18px;
  background: #c06040;
  border: 2.5px solid #000;
  border-radius: 0 0 5px 5px;
  position: relative;
  margin: 0 auto;
}
.plant-pot::before {
  content: '';
  position: absolute;
  top: -4px; left: -3px; right: -3px;
  height: 5px;
  background: #a04828;
  border: 2px solid #000;
  border-radius: 2px;
}
.plant-leaves {
  font-size: 28px;
  line-height: 1;
  text-align: center;
  position: relative;
  top: 0;
  filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.4));
}

/* couch */
.couch {
  position: absolute;
  top: 36px;
  left: 180px;
  width: 430px;
}
.couch-back {
  width: 430px; height: 28px;
  background: #7c4faf;
  border: 2.5px solid #000;
  border-radius: 6px 6px 0 0;
  position: relative;
}
.couch-back::before {
  content: '';
  position: absolute;
  top: 6px; left: 14px; right: 14px;
  height: 6px;
  background: rgba(255,255,255,0.18);
  border-radius: 3px;
}
.couch-seat {
  width: 430px; height: 36px;
  background: #9660cc;
  border: 2.5px solid #000;
  border-top: none;
  border-radius: 0 0 8px 8px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 10px;
}
.couch-cushion {
  width: 118px; height: 24px;
  background: #a870d8;
  border: 2px solid #000;
  border-radius: 4px;
}
.couch-arm {
  position: absolute;
  top: 0; bottom: 0;
  width: 20px;
  background: #7c4faf;
  border: 2.5px solid #000;
}
.couch-arm.l { left: -20px; border-radius: 6px 0 0 8px; }
.couch-arm.r { right: -20px; border-radius: 0 6px 8px 0; }

/* coffee table */
.coffee-table {
  position: absolute;
  top: 90px;
  left: 340px;
  width: 90px;
}
.ct-top {
  width: 90px; height: 22px;
  background: #8b6914;
  border: 2.5px solid #000;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  line-height: 1;
}
.ct-legs {
  display: flex;
  justify-content: space-between;
  padding: 0 8px;
}
.ct-leg {
  width: 6px; height: 10px;
  background: #6b4f10;
  border: 1.5px solid #000;
  border-top: none;
}

/* ============================================================
   DIVIDER WALL
   ============================================================ */
.wall-divider {
  position: absolute;
  top: 135px;
  left: 0; right: 0;
  z-index: 5;
}
.wall-top-face {
  height: 12px;
  background: #b8c8cc;
  border-top: 2.5px solid #000;
  border-bottom: 1px solid #000;
}
.wall-front-face {
  height: 48px;
  background: #9aafb4;
  border-bottom: 2.5px solid #000;
  position: relative;
}
/* door opening */
.door-gap {
  position: absolute;
  top: -12px;
  left: 440px;
  width: 64px;
  height: 60px;
  background: transparent;
  z-index: 6;
}
.door-frame-left {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  background: #6a7f84;
  border-left: 2px solid #000;
}
.door-frame-right {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 5px;
  background: #6a7f84;
  border-right: 2px solid #000;
}
.door-frame-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: #6a7f84;
  border-top: 2px solid #000;
}
/* mask out wall behind door */
.door-mask-top {
  position: absolute;
  top: 0;
  left: 445px;
  width: 54px;
  height: 12px;
  background: #d4e8c4;
  z-index: 7;
}
.door-mask-bottom {
  position: absolute;
  top: 12px;
  left: 445px;
  width: 54px;
  height: 48px;
  background: #f5eed8;
  z-index: 7;
}

/* ============================================================
   OFFICE FLOOR / WORK AREA
   ============================================================ */
.office-floor {
  position: absolute;
  top: 195px; left: 0; right: 0; bottom: 0;
  background-color: #c49a6c;
  background-image:
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 59px,
      rgba(0,0,0,0.08) 59px,
      rgba(0,0,0,0.08) 61px
    ),
    repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 38px,
      rgba(0,0,0,0.06) 38px,
      rgba(0,0,0,0.06) 40px
    );
  z-index: 0;
}

/* office ceiling lights (row above wall) */
.office-light {
  position: absolute;
  top: 148px;
  width: 56px; height: 10px;
  background: #fff9c4;
  border: 2px solid #ccc080;
  border-radius: 3px;
  box-shadow: 0 0 14px rgba(255,240,100,0.7), 0 0 28px rgba(255,240,100,0.3);
  z-index: 6;
}
.office-light:nth-of-type(1) { left: 100px; }
.office-light:nth-of-type(2) { left: 390px; }
.office-light:nth-of-type(3) { left: 680px; }

/* whiteboard */
.whiteboard {
  position: absolute;
  top: 200px;
  left: 10px;
  width: 70px;
  height: 50px;
  background: #f8f8f0;
  border: 3px solid #000;
  border-radius: 2px;
  overflow: hidden;
  z-index: 2;
}
.whiteboard::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 8px;
  background: #c0c0b0;
  border-top: 2px solid #000;
}
.wb-line {
  height: 2px;
  background: #3a80cc;
  margin: 7px 5px 0;
  border-radius: 1px;
  opacity: 0.7;
}
.wb-line:nth-child(2) { width: 50%; background: #cc3a3a; }
.wb-line:nth-child(3) { width: 80%; }
.wb-line:nth-child(4) { width: 60%; background: #3acc60; }

/* filing cabinet on right side */
.filing-cabinet {
  position: absolute;
  top: 205px;
  right: 12px;
  width: 38px;
  z-index: 2;
}
.fc-top {
  width: 38px; height: 8px;
  background: #8090a0;
  border: 2.5px solid #000;
  border-radius: 2px 2px 0 0;
}
.fc-body {
  width: 38px; height: 70px;
  background: #90a0b0;
  border: 2.5px solid #000;
  border-top: none;
  box-shadow: 4px 6px 0 #5a6a7a, 4px 6px 0 2px #000;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
  padding: 4px 0;
}
.fc-drawer {
  width: 28px; height: 14px;
  background: #a0b0c0;
  border: 2px solid #000;
  margin: 0 auto;
  border-radius: 1px;
  position: relative;
}
.fc-drawer::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 8px; height: 3px;
  background: #7a8a9a;
  border: 1px solid #000;
  border-radius: 1px;
}

/* ============================================================
   WORKSTATIONS
   ============================================================ */
.workstation {
  position: absolute;
  z-index: 10;
}

/* partition wall */
.pw-wrap { position: absolute; left: 0; top: 0; }
.pw-top {
  width: 200px; height: 10px;
  background: #9aafb4;
  border: 2.5px solid #000;
}
.pw-face {
  width: 200px; height: 55px;
  background: #7a9fa8;
  border: 2.5px solid #000;
  border-top: none;
  position: relative;
  display: flex;
  align-items: flex-end;
  padding-bottom: 6px;
  justify-content: center;
  box-shadow: 0 8px 0 #4a6f78, 0 8px 0 2px #000;
}
.nameplate {
  font-family: 'Arial Black', Arial, sans-serif;
  font-size: 9px;
  font-weight: 900;
  color: #e8f4f8;
  background: #4a6f78;
  border: 1.5px solid #2a4f58;
  border-radius: 2px;
  padding: 1px 6px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
/* small post-it notes on partition */
.pw-sticky {
  position: absolute;
  top: 8px; left: 10px;
  width: 16px; height: 16px;
  border: 1.5px solid #000;
  border-radius: 1px;
}
.pw-sticky:nth-child(2) { background: #ffe066; left: 10px; }
.pw-sticky:nth-child(3) { background: #ff9980; left: 30px; top: 6px; }
.pw-sticky:nth-child(4) { background: #80ccff; left: 50px; top: 10px; }

/* desk */
.desk-wrap { position: absolute; left: 15px; top: 65px; }
.desk-top {
  width: 170px; height: 55px;
  background: #c08840;
  border: 2.5px solid #000;
  position: relative;
}
.desk-front {
  width: 170px; height: 11px;
  background: #905820;
  border: 2.5px solid #000;
  border-top: none;
  box-shadow: 0 4px 0 #000;
}

/* monitor */
.monitor {
  position: absolute;
  top: 5px;
  left: 60px;
  width: 52px;
}
.monitor-screen {
  width: 52px; height: 38px;
  background: #0a1a0e;
  border: 2.5px solid #000;
  border-radius: 3px 3px 0 0;
  overflow: hidden;
  position: relative;
  transition: box-shadow 0.4s;
}
.workstation.working .monitor-screen {
  box-shadow: 0 0 14px rgba(0,220,100,0.75), 0 0 6px rgba(0,200,80,0.5);
}
.code-scroll {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 3px;
  animation: scroll-up 5s linear infinite paused;
}
.workstation.working .code-scroll {
  animation-play-state: running;
}
@keyframes scroll-up {
  0%   { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}
.cl {
  height: 2px;
  background: #00cc55;
  border-radius: 1px;
  opacity: 0.85;
}
.cl:nth-child(odd)  { width: 80%; }
.cl:nth-child(3n)   { width: 55%; opacity: 0.5; }
.cl:nth-child(4n)   { width: 90%; }
.cl:nth-child(5n)   { width: 40%; opacity: 0.6; }

.monitor-stand {
  width: 12px; height: 6px;
  background: #555;
  border: 2px solid #000;
  margin: 0 auto;
  border-top: none;
}
.monitor-base {
  width: 24px; height: 4px;
  background: #444;
  border: 2px solid #000;
  border-top: none;
  margin: 0 auto;
  border-radius: 0 0 2px 2px;
}

/* keyboard */
.keyboard {
  position: absolute;
  bottom: 8px;
  left: 22px;
  width: 40px; height: 8px;
  background: #c8c8c0;
  border: 2px solid #000;
  border-radius: 2px;
}
.keyboard::before {
  content: '';
  position: absolute;
  top: 2px; left: 2px; right: 2px;
  height: 2px;
  background: repeating-linear-gradient(90deg, #888 0px, #888 2px, transparent 2px, transparent 4px);
  border-radius: 1px;
}

/* coffee mug on desk */
.desk-mug {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 14px;
  line-height: 1;
}

/* mouse */
.desk-mouse {
  position: absolute;
  bottom: 8px;
  left: 68px;
  width: 8px; height: 12px;
  background: #d0d0c8;
  border: 1.5px solid #000;
  border-radius: 4px 4px 3px 3px;
}
.desk-mouse::before {
  content: '';
  position: absolute;
  top: 3px; left: 50%;
  transform: translateX(-50%);
  width: 1px; height: 4px;
  background: #000;
}

/* chair */
.chair-wrap { position: absolute; left: 22px; top: 135px; }
.chair-back {
  width: 30px; height: 12px;
  background: #3a3a5a;
  border: 2.5px solid #000;
  border-radius: 4px 4px 0 0;
  margin: 0 auto 0 3px;
}
.chair-seat {
  width: 36px; height: 36px;
  background: #3a3a5a;
  border: 2.5px solid #000;
  border-radius: 6px;
  box-shadow:
    4px 4px 0 0 #1a1a2a, 4px 4px 0 2px #000,
    -4px 4px 0 0 #1a1a2a, -4px 4px 0 2px #000;
  position: relative;
}
.chair-seat::after {
  content: '';
  position: absolute;
  top: 6px; left: 5px; right: 5px;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
}

/* ============================================================
   SOUTH PARK CHARACTERS
   ============================================================ */
.chars-layer {
  position: absolute;
  inset: 0;
  z-index: 30;
  pointer-events: none;
}

.sp {
  position: absolute;
  width: 32px;
  transition:
    left 1.1s cubic-bezier(0.45,0,0.25,1),
    top  1.1s cubic-bezier(0.45,0,0.25,1),
    transform 0.4s ease;
}

/* hat */
.sp .hat {
  position: absolute;
  top: -14px; left: 2px;
  width: 28px; height: 16px;
  background: var(--jc);
  border: 2.5px solid #000;
  border-radius: 5px 5px 0 0;
}
.sp .hat::after {
  content: '';
  position: absolute;
  bottom: -4px; left: -3px; right: -3px;
  height: 6px;
  background: var(--jc);
  border: 2.5px solid #000;
  border-top: none;
}

/* head */
.sp .head {
  position: absolute;
  top: 2px; left: 1px;
  width: 30px; height: 28px;
  background: #FDBCB4;
  border: 2.5px solid #000;
  border-radius: 50%;
}
/* eyes */
.sp .head::before {
  content: '';
  position: absolute;
  top: 9px; left: 6px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #000;
  box-shadow: 10px 0 0 #000;
}
/* mouth */
.sp .head::after {
  content: '';
  position: absolute;
  bottom: 5px; left: 9px;
  width: 12px; height: 4px;
  border-radius: 0 0 4px 4px;
  border: 2.5px solid #000;
  border-top: none;
}

/* body */
.sp .body {
  position: absolute;
  top: 26px; left: 0;
  width: 32px; height: 22px;
  background: var(--jc);
  border: 2.5px solid #000;
  border-radius: 40% 40% 20% 20%;
}

/* arms */
.sp .arm {
  position: absolute;
  top: 28px;
  width: 7px; height: 14px;
  background: var(--jc);
  border: 2.5px solid #000;
  border-radius: 3px;
  transform-origin: top center;
}
.sp .arm.l { left: -5px;  transform: rotate(-12deg); }
.sp .arm.r { right: -5px; transform: rotate(12deg); }

/* legs */
.sp .leg {
  position: absolute;
  top: 46px;
  width: 12px; height: 15px;
  background: #2a2848;
  border: 2.5px solid #000;
  border-radius: 0 0 4px 4px;
  transform-origin: top center;
}
.sp .leg.l { left: 3px; }
.sp .leg.r { right: 3px; }

/* ============================================================
   SPEECH BUBBLE
   ============================================================ */
.sp-bubble {
  position: absolute;
  bottom: calc(100% + 20px);
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border: 2.5px solid #000;
  border-radius: 8px;
  padding: 3px 8px;
  font-size: 9px;
  font-family: Arial, sans-serif;
  font-weight: bold;
  white-space: nowrap;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  pointer-events: none;
  z-index: 40;
}
.sp-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px; left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: #000;
}
.sp-bubble::before {
  content: '';
  position: absolute;
  bottom: -4px; left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: #fff;
  z-index: 1;
}

/* ============================================================
   ANIMATIONS
   ============================================================ */

/* walking */
@keyframes wlk-l  { 0%,100%{ transform: rotate(-28deg); } 50%{ transform: rotate(22deg); } }
@keyframes wlk-r  { 0%,100%{ transform: rotate(22deg);  } 50%{ transform: rotate(-28deg); } }
@keyframes wlk-al { 0%,100%{ transform: rotate(22deg);  } 50%{ transform: rotate(-18deg); } }
@keyframes wlk-ar { 0%,100%{ transform: rotate(-22deg); } 50%{ transform: rotate(18deg); } }
@keyframes walk-bob { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-3px); } }

.sp.walking .leg.l { animation: wlk-l  0.25s ease-in-out infinite; }
.sp.walking .leg.r { animation: wlk-r  0.25s ease-in-out infinite; }
.sp.walking .arm.l { animation: wlk-al 0.25s ease-in-out infinite; }
.sp.walking .arm.r { animation: wlk-ar 0.25s ease-in-out infinite; }
.sp.walking .body  { animation: walk-bob 0.25s ease-in-out infinite; }
.sp.walking { transform: scaleX(var(--fx, 1)) !important; }

/* typing */
@keyframes type-l  { 0%,100%{ transform: rotate(-32deg); } 50%{ transform: rotate(18deg); } }
@keyframes type-r  { 0%,100%{ transform: rotate(32deg);  } 50%{ transform: rotate(-18deg); } }
@keyframes head-nod { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-2px); } }

.sp.typing .arm.l { animation: type-l  0.2s ease-in-out infinite; }
.sp.typing .arm.r { animation: type-r  0.2s ease-in-out infinite; }
.sp.typing .head  { animation: head-nod 0.4s ease-in-out infinite; }

/* sit / stand */
@keyframes do-sit   {
  0%   { transform: translateY(0)    scaleY(1); }
  100% { transform: translateY(13px) scaleY(0.74); }
}
@keyframes do-stand {
  0%   { transform: translateY(13px) scaleY(0.74); }
  55%  { transform: translateY(-4px) scaleY(1.05); }
  100% { transform: translateY(0)    scaleY(1); }
}

.sp.seated       { transform: translateY(13px) scaleY(0.74); }
.sp.sitting-down { animation: do-sit   0.35s ease forwards; }
.sp.standing-up  { animation: do-stand 0.45s ease forwards; }

/* idle breathe */
@keyframes breathe { 0%,100%{ transform: scaleY(1); } 50%{ transform: scaleY(1.06); } }
.sp:not(.typing):not(.walking):not(.seated):not(.sitting-down):not(.standing-up) .body {
  animation: breathe 2.8s ease-in-out infinite;
}

/* ============================================================
   STATUS PANEL BELOW SCENE
   ============================================================ */
.panel {
  max-width: 900px;
  margin: 0 auto;
}

.agent-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 18px;
}

.agent-card {
  background: #fff;
  border: 3px solid #000;
  border-radius: 6px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  padding: 10px 14px;
  transition: background 0.4s, border-color 0.4s;
}
.agent-card.working { background: #eafff0; border-color: #00aa44; }
.agent-card.break   { background: #fff8e8; border-color: #cc8800; }
.agent-card.idle    { background: #f8f8f8; }

.agent-card h3 {
  font-family: 'Arial Black', Impact, sans-serif;
  font-size: 1rem;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.agent-card .status-badge {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: bold;
  padding: 2px 8px;
  border-radius: 3px;
  border: 2px solid #000;
  margin-bottom: 6px;
}
.working .status-badge { background: #00cc55; color: #fff; }
.break   .status-badge { background: #ffaa00; color: #fff; }
.idle    .status-badge { background: #aaa;    color: #fff; }

.ctask {
  font-size: 0.8rem;
  color: #333;
  font-style: italic;
  margin-top: 4px;
}
.ctask.empty { color: #999; }

/* controls */
.controls-section {
  background: #fff;
  border: 3px solid #000;
  border-radius: 6px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  padding: 16px 20px;
}
.controls-section h2 {
  font-family: 'Arial Black', Impact, sans-serif;
  font-size: 1rem;
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.controls-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.ctrl-block {
  border: 2.5px solid #000;
  border-radius: 6px;
  padding: 10px 12px;
  background: #fafafa;
}
.ctrl-block h4 {
  font-family: 'Arial Black', Impact, sans-serif;
  font-size: 0.85rem;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.ctrl-input {
  width: 100%;
  border: 2px solid #000;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 0.8rem;
  margin-bottom: 8px;
  outline: none;
}
.ctrl-input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
}
.ctrl-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.btn {
  font-family: 'Arial Black', Impact, sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.5px;
  padding: 4px 10px;
  border: 2.5px solid #000;
  border-radius: 4px;

  box-shadow: 2px 2px 0 #000;

.btn:active { transform: translate(2px,2px); box-shadow: none; }
.btn-work  { background: #00cc55; color: #fff; }
.btn-break { background: #ffaa00; color: #fff; }
.btn-idle  { background: #aaa;    color: #fff; }
</style>

<script>
/* ── Firebase init ── */
const FB = {
  apiKey:            "AIzaSyB1-Jz8C2-Ef_4XhToct78K-YM_JFVAxmA",
  authDomain:        "manager-3cf2b.firebaseapp.com",
  databaseURL:       "https://manager-3cf2b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "manager-3cf2b",
  storageBucket:     "manager-3cf2b.firebasestorage.app",
  messagingSenderId: "55315892331",
  appId:             "1:55315892331:web:9889b92c74e535a85a892e"
};
const fbApp = firebase.initializeApp(FB, 'office');
const db    = firebase.database(fbApp);
const PATH  = 'office/agents';

/* ── Positions ── */
const DESK_POS = {
  alpha: { left: '82px',  top: '400px' },
  beta:  { left: '372px', top: '400px' },
  gamma: { left: '662px', top: '400px' }
};
const COUCH_POS = {
  alpha: { left: '250px', top: '42px' },
  beta:  { left: '390px', top: '42px' },
  gamma: { left: '530px', top: '42px' }
};

/* ── State ── */
const atBreak = { alpha: false, beta: false, gamma: false };
const timers  = {};
const WALK_MS  = 1200;
const SIT_MS   = 380;
const STAND_MS = 480;

const BADGE_TEXT = { working: 'ARBEITET', break: 'PAUSE', idle: 'IDLE' };

function updateBadge(card, status) {
  const badge = card.querySelector('.status-badge');
  if (badge) badge.textContent = BADGE_TEXT[status] || 'IDLE';
}

/* ── Animation engine ── */
function applyAgent(id, status, task) {
  const sp    = document.getElementById(`sp-${id}`);
  const bub   = document.getElementById(`bub-${id}`);
  const ws    = document.getElementById(`ws-${id}`);
  const card  = document.getElementById(`card-${id}`);
  const ctask = document.getElementById(`ctask-${id}`);

  if (!sp || !bub || !card || !ctask) return;

  if (timers[id]) clearTimeout(timers[id]);

  function clearAnimClasses() {
    sp.classList.remove('walking','typing','seated','sitting-down','standing-up');
  }

  function setPos(posObj) {
    sp.style.left = posObj.left;
    sp.style.top  = posObj.top;
  }

  function startWalk(targetPos, goingRight, onArrival) {
    clearAnimClasses();
    sp.style.setProperty('--fx', goingRight ? '1' : '-1');
    sp.classList.add('walking');
    setPos(targetPos);
    bub.textContent = '…';
    timers[id] = setTimeout(() => {
      sp.classList.remove('walking');
      sp.style.removeProperty('--fx');
      onArrival();
    }, WALK_MS);
  }

  function sitDown(onDone) {
    sp.classList.add('sitting-down');
    timers[id] = setTimeout(() => {
      sp.classList.remove('sitting-down');
      sp.classList.add('seated');
      onDone();
    }, SIT_MS);
  }

  function standUp(onDone) {
    sp.classList.remove('seated','typing');
    sp.classList.add('standing-up');
    timers[id] = setTimeout(() => {
      sp.classList.remove('standing-up');
      onDone();
    }, STAND_MS);
  }

  /* BREAK */
  if (status === 'break') {
    if (ws) ws.classList.remove('working');
    card.className = 'agent-card break';
    updateBadge(card, 'break');
    ctask.textContent = 'Pause ☕';
    ctask.className = 'ctask';

    if (!atBreak[id]) {
      atBreak[id] = true;
      if (sp.classList.contains('typing') || sp.classList.contains('seated')) {
        standUp(() => {
          startWalk(COUCH_POS[id], true, () => {
            sitDown(() => { bub.textContent = '☕'; });
          });
        });
      } else {
        startWalk(COUCH_POS[id], true, () => {
          sitDown(() => { bub.textContent = '☕'; });
        });
      }
    } else {
      clearAnimClasses();
      setPos(COUCH_POS[id]);
      sp.classList.add('seated');
      bub.textContent = '☕';
    }

  /* WORKING */
  } else if (status === 'working') {
    card.className = 'agent-card working';
    updateBadge(card, 'working');
    ctask.textContent = task || 'Arbeitet…';
    ctask.className = 'ctask';

    if (atBreak[id]) {
      atBreak[id] = false;
      standUp(() => {
        startWalk(DESK_POS[id], false, () => {
          sitDown(() => {
            sp.classList.add('typing');
            bub.textContent = task || 'Arbeitet…';
            if (ws) ws.classList.add('working');
          });
        });
      });
    } else {
      clearAnimClasses();
      setPos(DESK_POS[id]);
      sitDown(() => {
        sp.classList.add('typing');
        bub.textContent = task || 'Arbeitet…';
        if (ws) ws.classList.add('working');
      });
    }

  /* IDLE */
  } else {
    if (ws) ws.classList.remove('working');
    card.className = 'agent-card idle';
    updateBadge(card, 'idle');
    ctask.textContent = 'Wartet auf Aufgabe…';
    ctask.className = 'ctask empty';

    if (atBreak[id]) {
      atBreak[id] = false;
      standUp(() => {
        startWalk(DESK_POS[id], false, () => {
          bub.textContent = 'Bereit';
        });
      });
    } else {
      clearAnimClasses();
      setPos(DESK_POS[id]);
      bub.textContent = 'Bereit';
    }
  }
}

/* ── Write helper ── */
function setAgent(id, status, task = '') {
  db.ref(`${PATH}/${id}`).set({ status, task: task.trim() });
}

/* ── Realtime listener ── */
db.ref(PATH).on('value', snap => {
  const d = snap.val() || {};
  ['alpha','beta','gamma'].forEach(id => {
    const a = d[id] || { status: 'idle', task: '' };
    applyAgent(id, a.status, a.task || '');
  });
});

/* ── Init defaults if empty ── */
db.ref(PATH).once('value', snap => {
  if (!snap.val()) {
    ['alpha','beta','gamma'].forEach(id =>
      db.ref(`${PATH}/${id}`).set({ status: 'idle', task: '' })
    );
  }
});
</script>
