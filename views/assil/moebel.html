<style>
  :root { --owner-color: var(--assil-c); }
  .nav-brand .owner-tag { background: var(--assil-c); color: #fff; }
  .btn-green { background: var(--success); color: #fff; border-color: var(--success); }
  .btn-green:hover { filter: brightness(1.08); }
  main { max-width: 1300px; margin: 0 auto; padding: 24px 20px 80px; display: flex; flex-direction: column; gap: 20px; }

  /* ── Summary Strip ── */
  .summary-strip { display: flex; gap: 10px; flex-wrap: wrap; }
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; min-width: 140px; flex: 1; box-shadow: var(--shadow-sm); }
  .sum-card.ok   { border-left: 3px solid var(--success); }
  .sum-card.warn { border-left: 3px solid var(--danger); }
  .s-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); margin-bottom: 5px; }
  .s-num { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .s-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }
  /* legacy sum-chip aliases (backward compat) */
  .sum-chip { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; min-width: 130px; box-shadow: var(--shadow-sm); }
  .sum-chip-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); margin-bottom: 4px; }
  .sum-chip-val { font-size: 22px; font-weight: 700; color: var(--text); }
  .sum-chip-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* ── Kategorie-Karte ── */
  .kat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .kat-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .kat-emoji { font-size: 16px; flex-shrink: 0; }
  .kat-title { font-size: 14px; font-weight: 700; flex: 1; color: var(--text); }
  .kat-gesamtbadge { font-size: 11px; font-weight: 700; color: var(--text-2); background: var(--surface3); border-radius: 20px; padding: 2px 9px; white-space: nowrap; }
  .rm-kat-btn { display: flex; align-items: center; gap: 5px; background: none; border: 1px solid rgba(217,48,37,0.2); color: var(--danger); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: 0.12s; }
  .rm-kat-btn:hover { background: var(--danger-light); }

  /* ── Tabelle ── */
  .tbl-wrap { overflow-x: auto; }
  .mtbl { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; min-width: 700px; }
  .mtbl col.c-name   { width: auto; }
  .mtbl col.c-bestand{ width: 130px; }
  .mtbl col.c-status { width: 120px; }
  .mtbl col.c-notiz  { width: 200px; }
  .mtbl col.c-ts     { width: 130px; }
  .mtbl col.c-rm     { width: 36px; }
  .mtbl thead th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-3); padding: 8px 14px; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface2); white-space: nowrap; }
  .mtbl tbody tr:hover td { background: var(--surface2); }
  .mtbl td { padding: 8px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; overflow: hidden; }
  .mtbl tbody tr:last-child td { border-bottom: none; }

  /* ── Farb-Chip ── */
  .fchip { display: flex; align-items: center; gap: 7px; font-weight: 500; color: var(--text); }
  .fdot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 1px solid var(--border); }

  /* ── Stepper ── */
  .stepper { display: flex; align-items: center; gap: 6px; }
  .s-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; color: var(--text-2); transition: 0.12s; flex-shrink: 0; }
  .s-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .s-val { font-size: 15px; font-weight: 700; width: 36px; text-align: center; color: var(--text); cursor: pointer; border-radius: 6px; padding: 2px 0; transition: 0.12s; }
  .s-val:hover { background: var(--accent-light); color: var(--accent); }
  .s-val.zero { color: var(--text-3); }

  /* ── Status-Badge ── */
  .sbadge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .sbadge.ok     { background: var(--success-light); color: var(--success); }
  .sbadge.wenig  { background: var(--warning-light); color: var(--warning); }
  .sbadge.leer   { background: var(--danger-light);  color: var(--danger); }
  .sbadge.mittel { background: var(--warning-light); color: var(--warning); }
  .sbadge.viel   { background: var(--success-light); color: var(--success); }

  /* ── Notiz-Input ── */
  .notiz { width: 100%; background: none; border: none; border-bottom: 1px solid transparent; font-size: 12px; font-family: var(--font); color: var(--text-2); padding: 3px 0; outline: none; transition: 0.12s; }
  .notiz:focus { border-bottom-color: var(--accent); color: var(--text); }
  .notiz::placeholder { color: var(--text-3); }

  /* ── Timestamp ── */
  .ts { font-size: 11px; color: var(--text-3); white-space: nowrap; }

  /* ── Löschen-Button ── */
  .rm-row-btn { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 4px; transition: 0.12s; }
  .rm-row-btn:hover { color: var(--danger); background: var(--danger-light); }

  /* ── Eintrag hinzufügen ── */
  .kat-add-row { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); background: var(--surface2); flex-wrap: wrap; }
  .kat-add-row input[type="text"] { flex: 1; min-width: 180px; font-size: 12px; font-family: var(--font); padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; transition: 0.12s; }
  .kat-add-row input[type="number"] { width: 80px; font-size: 12px; font-family: var(--font); padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; transition: 0.12s; }
  .kat-add-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .add-sub-btn { display: flex; align-items: center; gap: 5px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: 0.12s; white-space: nowrap; }
  .add-sub-btn:hover { filter: brightness(1.1); }

  /* ── Edit-Overlay ── */
  .edit-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .edit-overlay.open { display: flex; }
  .edit-box { background: var(--surface); border-radius: var(--radius-lg); padding: 26px 28px; max-width: 340px; width: 90%; box-shadow: var(--shadow-modal); border: 1px solid var(--border); }
  .edit-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .edit-box p  { font-size: 13px; color: var(--text-2); margin-bottom: 16px; }
  .edit-box input { width: 100%; font-size: 22px; font-weight: 700; text-align: center; font-family: var(--font); padding: 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); outline: none; background: var(--surface2); color: var(--text); margin-bottom: 16px; }
  .edit-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .edit-box-actions { display: flex; gap: 8px; }
  .edit-box-actions .btn { flex: 1; justify-content: center; }

  /* ── Modal fields ── */
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); margin-bottom: 5px; }
  .modal-field input { width: 100%; font-size: 14px; font-family: var(--font); padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); outline: none; background: var(--surface2); color: var(--text); }
  .modal-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal-actions .btn { flex: 1; justify-content: center; }
</style>
</head>

<!-- ── Passwort-Schutz ── -->
<div id="pwOverlay" style="position:fixed;inset:0;background:var(--bg,#f5f5f7);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:var(--surface,#fff);border:1px solid var(--border,#e0e0e0);border-radius:14px;padding:36px 30px;max-width:340px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.14);text-align:center;">
    <div style="font-size:32px;margin-bottom:14px;">🔒</div>
    <h2 style="font-size:18px;font-weight:700;margin-bottom:6px;color:var(--text,#1c1c1e);">Möbel Übersicht</h2>
    <p style="font-size:13px;color:var(--text-2,#6e6e73);margin-bottom:22px;">Bitte Passwort eingeben, um fortzufahren</p>
    <input type="password" id="pwInput" placeholder="Passwort…" autocomplete="current-password" style="width:100%;font-size:15px;padding:11px 14px;border:1.5px solid var(--border,#e0e0e0);border-radius:8px;outline:none;margin-bottom:10px;font-family:inherit;box-sizing:border-box;" />
    <div id="pwError" style="font-size:12px;color:#d93025;margin-bottom:10px;min-height:16px;"></div>
    <button onclick="checkPw()" style="width:100%;background:#0071e3;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Weiter →</button>
  </div>
</div>
<script>
(function(){
  const PW = 'Moebel2026';
  if(sessionStorage.getItem('moebelPwOk')==='1'){
    document.getElementById('pwOverlay').style.display='none';
  } else {
    setTimeout(()=>document.getElementById('pwInput').focus(),80);
    document.getElementById('pwInput').addEventListener('keydown',function(e){ if(e.key==='Enter') checkPw(); });
  }
  window.checkPw = function(){
    if(document.getElementById('pwInput').value===PW){
      sessionStorage.setItem('moebelPwOk','1');
      document.getElementById('pwOverlay').style.display='none';
    } else {
      document.getElementById('pwError').textContent='Falsches Passwort – bitte erneut versuchen';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
    }
  };
})();
</script>

/* ── State ── */
let _data = {};
let _db   = null;
let _saveTimer = null;
let _domBuilt  = false;

// Initialisiere mit Startwerten
KATEGORIEN.forEach(kat => {
  _data[kat.id] = {};
  kat.zeilen.forEach(z => { _data[kat.id][z.id] = { anzahl: z.start, notiz: '', updatedAt: '' }; });
});

/* ── Helpers ── */
function nowStr() {
  const d = new Date();
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) + ' '
       + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
function setSync(t, txt) {
  const el = document.getElementById('syncIndicator');
  const te = document.getElementById('syncText');
  if(el) el.className = 'sync-indicator ' + t;
  if(te) te.textContent = txt;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Katalog in Firebase speichern/laden ── */
function saveKatalog() {
  if (!_db) return;
  // Katalog als kompaktes Array in Firebase ablegen
  const katalogData = KATEGORIEN.map(k => ({
    id: k.id, titel: k.titel, emoji: k.emoji,
    zeilen: k.zeilen.map(z => ({ id: z.id, label: z.label }))
  }));
  _db.ref('moebelKatalog').set(katalogData)
    .catch(e => console.error('Katalog-Fehler', e));
}

/* ── Firebase ── */
(function initFb(){
  try {
    const app = firebase.initializeApp(FB_CFG);
    _db = firebase.database(app);

    // Erst Katalog laden, dann Bestandsdaten
    function startMoebelListener() {
      // Initialisiere _data für alle (inkl. neue) Kategorien
      KATEGORIEN.forEach(kat => {
        if (!_data[kat.id]) _data[kat.id] = {};
        kat.zeilen.forEach(z => {
          if (!_data[kat.id][z.id]) _data[kat.id][z.id] = { anzahl: z.start || 0, notiz: '', updatedAt: '' };
        });
      });

      // Jetzt Bestandsdaten live hören
      _db.ref('moebel').on('value', snap => {
        const fbData = snap.val();
        if (fbData) {
          KATEGORIEN.forEach(kat => {
            if (fbData[kat.id]) {
              kat.zeilen.forEach(z => {
                if (fbData[kat.id][z.id] !== undefined) {
                  const fb = fbData[kat.id][z.id];
                  if (!_data[kat.id]) _data[kat.id] = {};
                  if (!_data[kat.id][z.id]) _data[kat.id][z.id] = { anzahl: 0, notiz:'', updatedAt:'' };
                  _data[kat.id][z.id].anzahl    = fb.anzahl    != null ? fb.anzahl    : _data[kat.id][z.id].anzahl;
                  _data[kat.id][z.id].notiz     = fb.notiz     != null ? fb.notiz     : '';
                  _data[kat.id][z.id].updatedAt = fb.updatedAt != null ? fb.updatedAt : '';
                }
              });
            }
          });
        }
        // Einmalig: fehlende Einträge aus letztem bekannten Stand wiederherstellen
        if (!window._restoreDone) {
          window._restoreDone = true;
          const _restoreData = {
            'buerostuehle': {
              'jeansblau':  { anzahl:31, notiz:'', updatedAt:'24.03. 13:04' },
              'grau':       { anzahl:4,  notiz:'', updatedAt:'' },
              'dunkelblau': { anzahl:59, notiz:'', updatedAt:'16.04. 10:09' },
            },
            'schreibtisch_160': {
              'weiss':            { anzahl:30, notiz:'', updatedAt:'' },
              'grau':             { anzahl:55, notiz:'', updatedAt:'' },
              'grau_manuel_rad':  { anzahl:2,  notiz:'', updatedAt:'' },
              'grau_manuel_schr': { anzahl:4,  notiz:'', updatedAt:'' },
              'grau_auseinander': { anzahl:1,  notiz:'', updatedAt:'' },
              'holz_rollen':      { anzahl:6,  notiz:'', updatedAt:'20.03. 16:03' },
            },
            'schreibtisch_120': {
              'holz_rollen': { anzahl:4, notiz:'', updatedAt:'' },
            }
          };
          const _fbNow = snap.val() || {};
          const _updates = {};
          Object.keys(_restoreData).forEach(katId => {
            Object.keys(_restoreData[katId]).forEach(zeilId => {
              if (!_fbNow[katId] || _fbNow[katId][zeilId] === undefined || _fbNow[katId][zeilId] === null) {
                _updates['moebel/' + katId + '/' + zeilId] = _restoreData[katId][zeilId];
              }
            });
          });
          if (Object.keys(_updates).length > 0) {
            _db.ref('/').update(_updates)
              .then(() => console.log('Wiederhergestellte Einträge:', Object.keys(_updates)))
              .catch(e => console.error('Restore-Fehler:', e));
          }
        }
        _domBuilt = false; // DOM neu aufbauen bei Katalogänderungen
        renderAll();
        setSync('synced', 'Live ✓');
      }, () => { setSync('error','Firebase Fehler'); renderAll(); });
    }

    _db.ref('moebelKatalog').once('value', snapKat => {
      const fbKat = snapKat.val();
      if (fbKat && Array.isArray(fbKat) && fbKat.length > 0) {
        // Katalog aus Firebase übernehmen (neue Kategorien/Einträge)
        fbKat.forEach(fbK => {
          if (!fbK || !Array.isArray(fbK.zeilen)) return;
          const existing = KATEGORIEN.find(k => k.id === fbK.id);
          if (existing) {
            // Neue Zeilen ergänzen (vorhandene behalten, fehlende hinzufügen)
            fbK.zeilen.forEach(fbZ => {
              if (!existing.zeilen.find(z => z.id === fbZ.id)) {
                existing.zeilen.push({ id: fbZ.id, label: fbZ.label, farbe: '#aeaeb2', rand: null, start: 0 });
              }
            });
            // KEIN Entfernen von lokal definierten Zeilen – verhindert versehentliche Datenlöschung
          } else {
            // Komplett neue Kategorie
            KATEGORIEN.push({
              id: fbK.id, titel: fbK.titel, emoji: fbK.emoji || '📦',
              zeilen: fbK.zeilen.map(z => ({ id: z.id, label: z.label, farbe: '#aeaeb2', rand: null, start: 0 }))
            });
          }
        });
        // KEIN Entfernen von lokal definierten Kategorien – verhindert versehentliche Datenlöschung
        // (nur dynamisch hinzugefügte Kategorien mit Timestamp-ID werden entfernt wenn explizit gelöscht)
      } else {
        // Erster Start: Katalog initial in Firebase speichern
        saveKatalog();
      }
      startMoebelListener();
    }, () => {
      // Katalog nicht lesbar → trotzdem Bestandsdaten laden
      startMoebelListener();
    });
  } catch(e) { setSync('error','Init-Fehler'); console.error(e); renderAll(); }
})();

function updateValues() {
  KATEGORIEN.forEach(kat => {
    let total = 0;
    kat.zeilen.forEach(z => {
      const d = (_data[kat.id]||{})[z.id] || { anzahl:0, notiz:'', updatedAt:'' };
      const v = Math.max(0, Number(d.anzahl) || 0);
      total += v;

      const valEl = document.getElementById(`v-${kat.id}-${z.id}`);
      if (valEl) { valEl.textContent = v; valEl.className = 's-val ' + (v > 10 ? 'pos' : v > 0 ? '' : 'zero'); }

      const badgeEl = document.getElementById(`b-${kat.id}-${z.id}`);
      if (badgeEl) {
        if (v === 0)       { badgeEl.className = 'sbadge leer';   badgeEl.textContent = 'Leer'; }
        else if (v <= 5)   { badgeEl.className = 'sbadge mittel'; badgeEl.textContent = 'Wenig (' + v + ')'; }
        else               { badgeEl.className = 'sbadge viel';   badgeEl.textContent = 'OK (' + v + ')'; }
      }

      const noteEl = document.getElementById(`n-${kat.id}-${z.id}`);
      if (noteEl && document.activeElement !== noteEl) noteEl.value = d.notiz || '';

      const tsEl = document.getElementById(`t-${kat.id}-${z.id}`);
      if (tsEl) tsEl.textContent = d.updatedAt || '–';
    });

    const totEl = document.getElementById(`kat-tot-${kat.id}`);
    if (totEl) totEl.textContent = total + ' gesamt';
  });
}

function renderSummary() {
  let gesamt = 0, leer = 0, wenig = 0;
  KATEGORIEN.forEach(kat => {
    let tot = 0;
    kat.zeilen.forEach(z => { tot += Math.max(0, Number(((_data[kat.id]||{})[z.id]||{}).anzahl) || 0); });
    gesamt += tot;
    if (tot === 0) leer++;
    else if (tot <= 10) wenig++;
  });
  const strip = document.getElementById('summaryStrip');
  if (!strip) return;
  strip.innerHTML = `
    <div class="sum-card ok"><div class="s-lbl">Gesamt Artikel</div><div class="s-num">${gesamt}</div><div class="s-sub">verfügbar</div></div>
    <div class="sum-card"><div class="s-lbl">Kategorien</div><div class="s-num">${KATEGORIEN.length}</div><div class="s-sub">Möbeltypen</div></div>
    <div class="sum-card ${wenig>0?'warn':''}"><div class="s-lbl">Wenig Bestand</div><div class="s-num">${wenig}</div><div class="s-sub">Kategorien ≤ 10 Stk.</div></div>
    <div class="sum-card ${leer>0?'warn':''}"><div class="s-lbl">Leer</div><div class="s-num">${leer}</div><div class="s-sub">Kategorien = 0</div></div>
  `;
}

/* ── Bestand ändern ── */
function change(katId, zeilId, delta) {
  if (!_data[katId]) _data[katId] = {};
  if (!_data[katId][zeilId]) _data[katId][zeilId] = { anzahl:0, notiz:'', updatedAt:'' };
  _data[katId][zeilId].anzahl    = Math.max(0, (Number(_data[katId][zeilId].anzahl)||0) + delta);
  _data[katId][zeilId].updatedAt = nowStr();
  updateValues(); renderSummary(); scheduleSave();
}

function noteChange(katId, zeilId, val) {
  if (!_data[katId]) _data[katId] = {};
  if (!_data[katId][zeilId]) _data[katId][zeilId] = { anzahl:0, notiz:'', updatedAt:'' };
  _data[katId][zeilId].notiz     = val;
  _data[katId][zeilId].updatedAt = nowStr();
  scheduleSave();
}

/* ── Katalog-Editor: Zeile hinzufügen ── */
function addZeileInline(katId) {
  const labelEl  = document.getElementById(`subInput-${katId}`);
  const anzahlEl = document.getElementById(`subAnzahl-${katId}`);
  const label = labelEl.value.trim();
  if (!label) { labelEl.focus(); labelEl.style.borderColor='var(--danger)'; setTimeout(()=>labelEl.style.borderColor='',1200); return; }
  const kat = KATEGORIEN.find(k => k.id === katId);
  if (!kat) return;
  // ID aus Label ableiten
  const id = label.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'').slice(0,40) + '_' + Date.now().toString(36);
  const anzahl = Math.max(0, parseInt(anzahlEl.value)||0);
  kat.zeilen.push({ id, label, farbe:'#aeaeb2', rand:null, start: anzahl });
  if (!_data[katId]) _data[katId] = {};
  _data[katId][id] = { anzahl, notiz:'', updatedAt: nowStr() };
  labelEl.value = ''; anzahlEl.value = '';
  saveKatalog();
  scheduleSave();
  _domBuilt = false;
  renderAll();
  toast(`"${label}" zu ${kat.titel} hinzugefügt ✓`);
  // Katalog auch in Firebase-Pfad schreiben damit Louis/Rohat ihn laden können
  syncKatalogToDropdown();
}

/* ── Katalog-Editor: Zeile löschen ── */
function removeZeile(katId, zeilId) {
  const kat = KATEGORIEN.find(k => k.id === katId);
  if (!kat) return;
  const z = kat.zeilen.find(z => z.id === zeilId);
  if (!z) return;
  if (!confirm(`Eintrag "${z.label}" wirklich löschen? Der Bestandswert geht verloren.`)) return;
  kat.zeilen = kat.zeilen.filter(z => z.id !== zeilId);
  if (_data[katId]) delete _data[katId][zeilId];
  if (_db) _db.ref(`moebel/${katId}/${zeilId}`).remove();
  saveKatalog();
  _domBuilt = false;
  renderAll();
  toast(`"${z.label}" gelöscht ✓`);
  syncKatalogToDropdown();
}

/* ── Katalog-Editor: Kategorie löschen ── */
function removeKat(katId) {
  const kat = KATEGORIEN.find(k => k.id === katId);
  if (!kat) return;
  if (!confirm(`Kategorie "${kat.titel}" mit allen ${kat.zeilen.length} Einträgen löschen? Nicht rückgängig machbar.`)) return;
  const idx = KATEGORIEN.findIndex(k => k.id === katId);
  KATEGORIEN.splice(idx, 1);
  if (_data[katId]) { delete _data[katId]; if (_db) _db.ref(`moebel/${katId}`).remove(); }
  saveKatalog();
  _domBuilt = false;
  renderAll();
  toast(`"${kat.titel}" gelöscht ✓`);
  syncKatalogToDropdown();
}

function openAddKatModal() {
  document.getElementById('newKatTitel').value = '';

  setTimeout(() => document.getElementById('newKatTitel').focus(), 80);
}
function closeAddKatModal() { document.getElementById('addKatOverlay').classList.remove('open'); }
function confirmAddKat() {
  const titel = document.getElementById('newKatTitel').value.trim();
  if (!titel) { document.getElementById('newKatTitel').focus(); return; }
  const emoji = document.getElementById('newKatEmoji').value.trim() || '📦';
  const id = titel.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'').slice(0,30) + '_' + Date.now().toString(36);
  KATEGORIEN.push({ id, titel, emoji, zeilen: [] });
  if (!_data[id]) _data[id] = {};
  saveKatalog();
  _domBuilt = false;
  renderAll();
  closeAddKatModal();
  toast(`Kategorie "${titel}" hinzugefügt ✓`);
  syncKatalogToDropdown();
}

/* ── Dropdown-Katalog für Louis/Rohat synchronisieren ── */
// Schreibt einen kompakten Katalog in Firebase den Louis/Rohat beim Start laden
function syncKatalogToDropdown() {
  if (!_db) return;
  const katalog = KATEGORIEN.map(k => ({
    id: k.id,
    label: k.titel,
    subs: k.zeilen.map(z => ({ id: z.id, label: z.label }))
  }));
  _db.ref('moebelDropdownKatalog').set(katalog);
}

function scheduleSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(save, 700); }

function save() {
  if (!_db) return;
  setSync('syncing','Speichern…');
  // Granulares Update statt set() – verhindert versehentliches Löschen anderer Kategorien
  const updates = {};
  KATEGORIEN.forEach(kat => {
    kat.zeilen.forEach(z => {
      const d = (_data[kat.id]||{})[z.id];
      if (d) updates['moebel/' + kat.id + '/' + z.id] = d;
    });
  });
  _db.ref('/').update(updates)
    .then(()=>{ setSync('synced','Gespeichert ✓'); toast('Gespeichert ✓'); })
    .catch(e=>{ setSync('error','Fehler'); console.error(e); });
}

/* ── Direkteingabe Modal ── */
let _editKat = null, _editZeil = null;
function openEdit(katId, zeilId, label) {
  _editKat = katId; _editZeil = zeilId;
  document.getElementById('editTitle').textContent = label + ' — Bestand';
  document.getElementById('editSub').textContent   = 'Aktuell: ' + (((_data[katId]||{})[zeilId]||{}).anzahl || 0);
  const inp = document.getElementById('editInput');
  inp.value = ((_data[katId]||{})[zeilId]||{}).anzahl || 0;
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(()=>{ inp.focus(); inp.select(); }, 80);
}
function closeEdit() { document.getElementById('editOverlay').classList.remove('open'); _editKat=null; _editZeil=null; }
function confirmEdit() {
  if (!_editKat || !_editZeil) return;
  const v = Math.max(0, parseInt(document.getElementById('editInput').value)||0);
  if (!_data[_editKat]) _data[_editKat] = {};
  if (!_data[_editKat][_editZeil]) _data[_editKat][_editZeil] = { anzahl:0, notiz:'', updatedAt:'' };
  _data[_editKat][_editZeil].anzahl    = v;
  _data[_editKat][_editZeil].updatedAt = nowStr();
  updateValues(); renderSummary(); scheduleSave(); closeEdit();
}
document.getElementById('editInput').addEventListener('keydown', e => {
  if (e.key==='Enter') confirmEdit();
  if (e.key==='Escape') closeEdit();
});
document.getElementById('editOverlay').addEventListener('click', e => {
  if (e.target===document.getElementById('editOverlay')) closeEdit();
});
document.getElementById('addKatOverlay').addEventListener('click', e => {
  if (e.target===document.getElementById('addKatOverlay')) closeAddKatModal();
});
document.getElementById('newKatTitel').addEventListener('keydown', e => {
  if (e.key==='Enter') confirmAddKat();
  if (e.key==='Escape') closeAddKatModal();
});

/* ── Excel Export ── */
function exportExcel() {
  const rows = [['Kategorie','Typ / Farbe / Maße','Bestand','Status','Notiz','Geändert']];
  KATEGORIEN.forEach(kat => {
    kat.zeilen.forEach(z => {
      const d = ((_data[kat.id]||{})[z.id]) || {};
      const v = Math.max(0, Number(d.anzahl)||0);
      rows.push([kat.titel, z.label, v, v===0?'Leer':v<=5?'Wenig':'OK', d.notiz||'', d.updatedAt||'']);
    });
    rows.push(['','','','','','']);
  });
  let xmlRows = rows.map((row,ri) => {
    const cells = row.map(cell => {
      if (ri===0) return `<Cell ss:StyleID="hdr"><Data ss:Type="String">${escXml(String(cell))}</Data></Cell>`;
      if (typeof cell==='number') return `<Cell><Data ss:Type="Number">${cell}</Data></Cell>`;
      return `<Cell><Data ss:Type="String">${escXml(String(cell))}</Data></Cell>`;
    }).join('');
    return `<Row>${cells}</Row>`;
  }).join('\n');
  const xml = `<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
  <Styles>
    <Style ss:ID="hdr"><Interior ss:Color="#FF9500" ss:Pattern="Solid"/><Font ss:Bold="1" ss:Color="#FFFFFF" ss:Size="11"/></Style>
  </Styles>
  <Worksheet ss:Name="Möbel Bestand">
    <Table>
      <Column ss:Width="200"/><Column ss:Width="200"/><Column ss:Width="80"/><Column ss:Width="80"/><Column ss:Width="180"/><Column ss:Width="130"/>
      ${xmlRows}
    </Table>
  </Worksheet>
</Workbook>`;
  const datum = new Date().toLocaleDateString('de-DE').replace(/\./g,'-');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([xml],{type:'application/vnd.ms-excel;charset=utf-8'}));
  a.download = `Moebel_Bestand_${datum}.xls`;
  a.click();
  toast('Excel exportiert ✓');
}
function escXml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Toast ── */
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), 2400);
}
