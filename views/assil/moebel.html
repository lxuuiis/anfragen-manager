<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --surface2: #f5f5f7;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.14);
    --text: #1d1d1f; --text-secondary: #6e6e73; --text-tertiary: #aeaeb2;
    --accent: #ff9500; --accent-hover: #e08600; --accent-light: #fff8e6;
    --danger: #ff3b30;
    --success: #34c759; --warning: #ff9500;
    --radius: 14px; --radius-sm: 9px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    --tr: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  nav { background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; padding: 0 28px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
  .owner-tag { background: #7c3aed; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
  .nav-actions { display: flex; align-items: center; gap: 8px; }
  .back-btn { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:var(--text-secondary); text-decoration:none; padding:5px 10px; border-radius:8px; border:1px solid rgba(0,0,0,0.14); transition:0.15s ease; }
  .back-btn:hover { background:rgba(0,0,0,0.05); color:var(--text); }
  .sync-indicator { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-tertiary); }
  .sync-indicator.synced { color: var(--success); }
  .sync-indicator.syncing { color: var(--warning); }
  .sync-indicator.error { color: var(--danger); }
  .sync-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: var(--tr); white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-strong); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-green { background: #34c759; color: #fff; }
  .btn-green:hover { background: #28a347; transform: translateY(-1px); }
  main { max-width: 1340px; margin: 0 auto; padding: 28px 20px 80px; display: flex; flex-direction: column; gap: 28px; }
  .summary-strip { display: flex; gap: 10px; flex-wrap: wrap; }
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow); padding: 12px 16px; flex: 1; min-width: 110px; }
  .sum-card .s-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); margin-bottom: 4px; }
  .sum-card .s-num { font-size: 22px; font-weight: 700; line-height: 1; }
  .sum-card .s-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .sum-card.warn .s-num { color: var(--danger); }
  .sum-card.ok   .s-num { color: var(--success); }
  .kat-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
  .kat-head { display: flex; align-items: center; gap: 12px; padding: 14px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .kat-emoji { font-size: 20px; }
  .kat-title { font-size: 15px; font-weight: 700; }
  .kat-gesamtbadge { margin-left: auto; font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 20px; background: var(--accent-light); color: var(--accent); border: 1px solid rgba(255,149,0,0.25); }
  .tbl-wrap { overflow-x: auto; }
  .mtbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .mtbl thead th { padding: 10px 16px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); background: #fafafa; border-bottom: 1px solid var(--border-strong); white-space: nowrap; }
  .mtbl tbody tr { border-bottom: 1px solid var(--border); transition: background var(--tr); }
  .mtbl tbody tr:last-child { border-bottom: none; }
  .mtbl tbody tr:hover { background: #fffbf2; }
  .mtbl td { padding: 11px 16px; vertical-align: middle; }
  .fchip { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; }
  .fdot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .stepper { display: inline-flex; align-items: center; border: 1px solid var(--border-strong); border-radius: 10px; overflow: hidden; background: var(--surface); }
  .s-btn { background: none; border: none; width: 36px; height: 36px; font-size: 17px; font-weight: 700; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: var(--tr); user-select: none; }
  .s-btn:hover { background: #ebebef; color: var(--text); }
  .s-btn:active { background: #e0e0e5; }
  .s-val { min-width: 52px; text-align: center; font-size: 17px; font-weight: 700; border-left: 1px solid var(--border); border-right: 1px solid var(--border); padding: 0 6px; line-height: 36px; cursor: pointer; transition: color var(--tr); }
  .s-val.pos { color: var(--success); }
  .s-val.zero { color: var(--text-tertiary); }
  .sbadge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .sbadge.viel   { background: #e8f8ee; color: #1a7a36; }
  .sbadge.mittel { background: #fff8e6; color: #b07800; }
  .sbadge.leer   { background: #fff0f0; color: var(--danger); }
  .notiz { font-family: var(--font); font-size: 12px; color: var(--text); background: transparent; border: 1px solid transparent; border-radius: 7px; padding: 5px 8px; outline: none; transition: var(--tr); width: 100%; min-width: 140px; }
  .notiz:hover { border-color: var(--border-strong); background: var(--surface2); }
  .notiz:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(255,149,0,0.12); }
  .notiz::placeholder { color: var(--text-tertiary); }
  .ts { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(29,29,31,0.92); backdrop-filter: blur(12px); color:#fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  .edit-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); z-index:500; display:none; align-items:center; justify-content:center; }
  .edit-overlay.open { display:flex; }
  .edit-box { background:#fff; border-radius:18px; padding:28px; width:320px; max-width:95vw; box-shadow:0 24px 60px rgba(0,0,0,0.2); }
  .edit-box h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
  .edit-box p  { font-size:12px; color:var(--text-secondary); margin-bottom:18px; }
  .edit-box input { width:100%; font-size:28px; font-weight:700; text-align:center; border:2px solid var(--border-strong); border-radius:10px; padding:12px; font-family:var(--font); outline:none; }
  .edit-box input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,149,0,0.15); }
  .edit-box-actions { display:flex; gap:8px; margin-top:18px; }
  .edit-box-actions .btn { flex:1; justify-content:center; }
  /* Katalog-Editor */
  .kat-add-row { display:flex; gap:8px; align-items:center; padding:10px 20px; background:var(--surface2); border-top:1px solid var(--border); }
  .kat-add-row input { flex:1; font-size:13px; font-family:var(--font); padding:7px 12px; border:1px solid var(--border-strong); border-radius:8px; outline:none; background:#fff; }
  .kat-add-row input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,149,0,0.12); }
  .add-sub-btn { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:#0071e3; background:none; border:none; cursor:pointer; padding:5px 8px; border-radius:7px; white-space:nowrap; }
  .add-sub-btn:hover { background:#e8f1fb; }
  .rm-row-btn { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:6px; background:none; border:none; cursor:pointer; color:var(--text-tertiary); font-size:14px; flex-shrink:0; }
  .rm-row-btn:hover { background:#fff0f0; color:var(--danger); }
  .rm-kat-btn { margin-left:auto; display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:var(--danger); background:none; border:1px solid rgba(255,59,48,0.3); border-radius:8px; padding:4px 10px; cursor:pointer; }
  .rm-kat-btn:hover { background:#fff0f0; }
  .add-kat-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); border:2px dashed var(--border-strong); display:flex; align-items:center; justify-content:center; gap:10px; padding:22px; cursor:pointer; transition:var(--tr); }
  .add-kat-card:hover { border-color:var(--accent); background:var(--accent-light); }
  .add-kat-card span { font-size:14px; font-weight:600; color:var(--text-secondary); }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.35); backdrop-filter:blur(4px); z-index:600; display:none; align-items:center; justify-content:center; }

  .modal-box h3 { font-size:16px; font-weight:700; margin-bottom:16px; }
  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-secondary); margin-bottom:5px; }
  .modal-field input { width:100%; font-size:14px; font-family:var(--font); padding:9px 12px; border:1.5px solid var(--border-strong); border-radius:9px; outline:none; }
  .modal-field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,149,0,0.12); }
  .modal-actions { display:flex; gap:8px; margin-top:18px; }
  .modal-actions .btn { flex:1; justify-content:center; }

</head>

    <p id="editSub">Aktueller Wert:</p>
    <input type="number" id="editInput" min="0" />
    <div class="edit-box-actions">
      <button class="btn btn-ghost" onclick="closeEdit()">Abbrechen</button>
      <button class="btn btn-primary" onclick="confirmEdit()">Übernehmen</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Modal: Neue Kategorie hinzufügen -->
<div class="modal-overlay" id="addKatOverlay">
  <div class="modal-box">
    <h3>📦 Neue Kategorie</h3>
    <div class="modal-field">
      <label>Name der Kategorie</label>
      <input type="text" id="newKatTitel" placeholder="z.B. Trennwände" />
    </div>
    <div class="modal-field">
      <label>Emoji (optional)</label>
      <input type="text" id="newKatEmoji" placeholder="z.B. 🧱" maxlength="4" style="font-size:22px;text-align:center;" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddKatModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="confirmAddKat()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Modal: Neuen Eintrag hinzufügen -->
<div class="modal-overlay" id="addSubOverlay">
  <div class="modal-box">
    <h3 id="addSubTitle">➕ Neuer Eintrag</h3>
    <div class="modal-field">
      <label>Bezeichnung</label>
      <input type="text" id="newSubLabel" placeholder="z.B. Weiß 120×80" />
    </div>
    <div class="modal-field">
      <label>Startbestand</label>
      <input type="number" id="newSubAnzahl" placeholder="0" min="0" value="0" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddSubModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="confirmAddSub()">Hinzufügen</button>
    </div>
  </div>
</div>

/* ── State ── */
let _data = {};
let _db   = null;
let _saveTimer = null;
let _domBuilt  = false;

// Initialisiere mit Startwerten
KATEGORIEN.forEach(kat => {
  _data[kat.id] = {};
  kat.zeilen.forEach(z => { _data[kat.id][z.id] = { anzahl: z.start, notiz: '', updatedAt: '' }; });
});

/* ── Helpers ── */
function nowStr() {
  const d = new Date();
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) + ' '
       + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
function setSync(t, txt) {
  const el = document.getElementById('syncIndicator');
  const te = document.getElementById('syncText');
  if(el) el.className = 'sync-indicator ' + t;
  if(te) te.textContent = txt;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Katalog in Firebase speichern/laden ── */
function saveKatalog() {
  if (!_db) return;
  // Katalog als kompaktes Array in Firebase ablegen
  const katalogData = KATEGORIEN.map(k => ({
    id: k.id, titel: k.titel, emoji: k.emoji,
    zeilen: k.zeilen.map(z => ({ id: z.id, label: z.label }))
  }));
  _db.ref('moebelKatalog').set(katalogData)
    .catch(e => console.error('Katalog-Fehler', e));
}

/* ── Firebase ── */
(function initFb(){
  try {
    const app = firebase.initializeApp(FB_CFG);
    _db = firebase.database(app);

    // Erst Katalog laden, dann Bestandsdaten
    _db.ref('moebelKatalog').once('value', snapKat => {
      const fbKat = snapKat.val();
      if (fbKat && Array.isArray(fbKat) && fbKat.length > 0) {
        // Katalog aus Firebase übernehmen (neue Kategorien/Einträge)
        fbKat.forEach(fbK => {
          const existing = KATEGORIEN.find(k => k.id === fbK.id);
          if (existing) {
            // Neue Zeilen ergänzen (vorhandene behalten, fehlende hinzufügen)
            fbK.zeilen.forEach(fbZ => {
              if (!existing.zeilen.find(z => z.id === fbZ.id)) {
                existing.zeilen.push({ id: fbZ.id, label: fbZ.label, farbe: '#aeaeb2', rand: null, start: 0 });
              }
            });
            // Zeilen die in Firebase fehlen → entfernen
            existing.zeilen = existing.zeilen.filter(z => fbK.zeilen.find(fbZ => fbZ.id === z.id));
          } else {
            // Komplett neue Kategorie
            KATEGORIEN.push({
              id: fbK.id, titel: fbK.titel, emoji: fbK.emoji || '📦',
              zeilen: fbK.zeilen.map(z => ({ id: z.id, label: z.label, farbe: '#aeaeb2', rand: null, start: 0 }))
            });
          }
        });
        // Kategorien die in Firebase nicht mehr existieren → entfernen
        for (let i = KATEGORIEN.length - 1; i >= 0; i--) {
          if (!fbKat.find(fbK => fbK.id === KATEGORIEN[i].id)) {
            KATEGORIEN.splice(i, 1);
          }
        }
      } else {
        // Erster Start: Katalog initial in Firebase speichern
        saveKatalog();
      }

      // Initialisiere _data für alle (inkl. neue) Kategorien
      KATEGORIEN.forEach(kat => {
        if (!_data[kat.id]) _data[kat.id] = {};
        kat.zeilen.forEach(z => {
          if (!_data[kat.id][z.id]) _data[kat.id][z.id] = { anzahl: z.start || 0, notiz: '', updatedAt: '' };
        });
      });

      // Jetzt Bestandsdaten live hören
      _db.ref('moebel').on('value', snap => {
        const fbData = snap.val();
        if (fbData) {
          KATEGORIEN.forEach(kat => {
            if (fbData[kat.id]) {
              kat.zeilen.forEach(z => {
                if (fbData[kat.id][z.id] !== undefined) {
                  const fb = fbData[kat.id][z.id];
                  if (!_data[kat.id]) _data[kat.id] = {};
                  if (!_data[kat.id][z.id]) _data[kat.id][z.id] = { anzahl: 0, notiz:'', updatedAt:'' };
                  _data[kat.id][z.id].anzahl    = fb.anzahl    != null ? fb.anzahl    : _data[kat.id][z.id].anzahl;
                  _data[kat.id][z.id].notiz     = fb.notiz     != null ? fb.notiz     : '';
                  _data[kat.id][z.id].updatedAt = fb.updatedAt != null ? fb.updatedAt : '';
                }
              });
            }
          });
        }
        _domBuilt = false; // DOM neu aufbauen bei Katalogänderungen
        renderAll();
        setSync('synced', 'Live ✓');
      }, () => { setSync('error','Firebase Fehler'); renderAll(); });
    });
  } catch(e) { setSync('error','Init-Fehler'); console.error(e); renderAll(); }
})();

/* ── Render ── */

  if (!_domBuilt) buildDOM();
  updateValues();
  renderSummary();
}

        <input type="number" min="0" placeholder="Anzahl" id="subAnzahl-${kat.id}" style="width:90px;flex:none" onkeydown="if(event.key==='Enter')addZeileInline('${kat.id}')" />

function updateValues() {
  KATEGORIEN.forEach(kat => {
    let total = 0;
    kat.zeilen.forEach(z => {
      const d = (_data[kat.id]||{})[z.id] || { anzahl:0, notiz:'', updatedAt:'' };
      const v = Math.max(0, Number(d.anzahl) || 0);
      total += v;

      const valEl = document.getElementById(`v-${kat.id}-${z.id}`);
      if (valEl) { valEl.textContent = v; valEl.className = 's-val ' + (v > 10 ? 'pos' : v > 0 ? '' : 'zero'); }

      const badgeEl = document.getElementById(`b-${kat.id}-${z.id}`);
      if (badgeEl) {
        if (v === 0)       { badgeEl.className = 'sbadge leer';   badgeEl.textContent = 'Leer'; }
        else if (v <= 5)   { badgeEl.className = 'sbadge mittel'; badgeEl.textContent = 'Wenig (' + v + ')'; }
        else               { badgeEl.className = 'sbadge viel';   badgeEl.textContent = 'OK (' + v + ')'; }
      }

      const noteEl = document.getElementById(`n-${kat.id}-${z.id}`);
      if (noteEl && document.activeElement !== noteEl) noteEl.value = d.notiz || '';

      const tsEl = document.getElementById(`t-${kat.id}-${z.id}`);
      if (tsEl) tsEl.textContent = d.updatedAt || '–';
    });

    const totEl = document.getElementById(`kat-tot-${kat.id}`);
    if (totEl) totEl.textContent = total + ' gesamt';
  });
}

function renderSummary() {
  let gesamt = 0, leer = 0, wenig = 0;
  KATEGORIEN.forEach(kat => {
    let tot = 0;
    kat.zeilen.forEach(z => { tot += Math.max(0, Number(((_data[kat.id]||{})[z.id]||{}).anzahl) || 0); });
    gesamt += tot;
    if (tot === 0) leer++;
    else if (tot <= 10) wenig++;
  });
  const strip = document.getElementById('summaryStrip');
  if (!strip) return;
  strip.innerHTML = `
    <div class="sum-card ok"><div class="s-lbl">Gesamt Artikel</div><div class="s-num">${gesamt}</div><div class="s-sub">verfügbar</div></div>
    <div class="sum-card"><div class="s-lbl">Kategorien</div><div class="s-num">${KATEGORIEN.length}</div><div class="s-sub">Möbeltypen</div></div>
    <div class="sum-card ${wenig>0?'warn':''}"><div class="s-lbl">Wenig Bestand</div><div class="s-num">${wenig}</div><div class="s-sub">Kategorien ≤ 10 Stk.</div></div>
    <div class="sum-card ${leer>0?'warn':''}"><div class="s-lbl">Leer</div><div class="s-num">${leer}</div><div class="s-sub">Kategorien = 0</div></div>
  `;
}

/* ── Bestand ändern ── */
function change(katId, zeilId, delta) {
  if (!_data[katId]) _data[katId] = {};
  if (!_data[katId][zeilId]) _data[katId][zeilId] = { anzahl:0, notiz:'', updatedAt:'' };
  _data[katId][zeilId].anzahl    = Math.max(0, (Number(_data[katId][zeilId].anzahl)||0) + delta);
  _data[katId][zeilId].updatedAt = nowStr();
  updateValues(); renderSummary(); scheduleSave();
}

function noteChange(katId, zeilId, val) {
  if (!_data[katId]) _data[katId] = {};
  if (!_data[katId][zeilId]) _data[katId][zeilId] = { anzahl:0, notiz:'', updatedAt:'' };
  _data[katId][zeilId].notiz     = val;
  _data[katId][zeilId].updatedAt = nowStr();
  scheduleSave();
}

/* ── Katalog-Editor: Zeile hinzufügen ── */
function addZeileInline(katId) {
  const labelEl  = document.getElementById(`subInput-${katId}`);
  const anzahlEl = document.getElementById(`subAnzahl-${katId}`);
  const label = labelEl.value.trim();
  if (!label) { labelEl.focus(); labelEl.style.borderColor='var(--danger)'; setTimeout(()=>labelEl.style.borderColor='',1200); return; }
  const kat = KATEGORIEN.find(k => k.id === katId);
  if (!kat) return;
  // ID aus Label ableiten
  const id = label.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'').slice(0,40) + '_' + Date.now().toString(36);
  const anzahl = Math.max(0, parseInt(anzahlEl.value)||0);
  kat.zeilen.push({ id, label, farbe:'#aeaeb2', rand:null, start: anzahl });
  if (!_data[katId]) _data[katId] = {};
  _data[katId][id] = { anzahl, notiz:'', updatedAt: nowStr() };
  labelEl.value = ''; anzahlEl.value = '';
  saveKatalog();
  scheduleSave();
  _domBuilt = false;
  renderAll();
  toast(`"${label}" zu ${kat.titel} hinzugefügt ✓`);
  // Katalog auch in Firebase-Pfad schreiben damit Louis/Rohat ihn laden können
  syncKatalogToDropdown();
}

/* ── Katalog-Editor: Zeile löschen ── */
function removeZeile(katId, zeilId) {
  const kat = KATEGORIEN.find(k => k.id === katId);
  if (!kat) return;
  const z = kat.zeilen.find(z => z.id === zeilId);
  if (!z) return;
  if (!confirm(`Eintrag "${z.label}" wirklich löschen? Der Bestandswert geht verloren.`)) return;
  kat.zeilen = kat.zeilen.filter(z => z.id !== zeilId);
  if (_data[katId]) delete _data[katId][zeilId];
  if (_db) _db.ref(`moebel/${katId}/${zeilId}`).remove();
  saveKatalog();
  _domBuilt = false;
  renderAll();
  toast(`"${z.label}" gelöscht ✓`);
  syncKatalogToDropdown();
}

/* ── Katalog-Editor: Kategorie löschen ── */
function removeKat(katId) {
  const kat = KATEGORIEN.find(k => k.id === katId);
  if (!kat) return;
  if (!confirm(`Kategorie "${kat.titel}" mit allen ${kat.zeilen.length} Einträgen löschen? Nicht rückgängig machbar.`)) return;
  const idx = KATEGORIEN.findIndex(k => k.id === katId);
  KATEGORIEN.splice(idx, 1);
  if (_data[katId]) { delete _data[katId]; if (_db) _db.ref(`moebel/${katId}`).remove(); }
  saveKatalog();
  _domBuilt = false;
  renderAll();
  toast(`"${kat.titel}" gelöscht ✓`);
  syncKatalogToDropdown();
}

/* ── Modal: Neue Kategorie ── */
function openAddKatModal() {
  document.getElementById('newKatTitel').value = '';
  document.getElementById('newKatEmoji').value = '';
  document.getElementById('addKatOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newKatTitel').focus(), 80);
}
function closeAddKatModal() { document.getElementById('addKatOverlay').classList.remove('open'); }
function confirmAddKat() {
  const titel = document.getElementById('newKatTitel').value.trim();
  if (!titel) { document.getElementById('newKatTitel').focus(); return; }
  const emoji = document.getElementById('newKatEmoji').value.trim() || '📦';
  const id = titel.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'').slice(0,30) + '_' + Date.now().toString(36);
  KATEGORIEN.push({ id, titel, emoji, zeilen: [] });
  if (!_data[id]) _data[id] = {};
  saveKatalog();
  _domBuilt = false;
  renderAll();
  closeAddKatModal();
  toast(`Kategorie "${titel}" hinzugefügt ✓`);
  syncKatalogToDropdown();
}

/* ── Dropdown-Katalog für Louis/Rohat synchronisieren ── */
// Schreibt einen kompakten Katalog in Firebase den Louis/Rohat beim Start laden
function syncKatalogToDropdown() {
  if (!_db) return;
  const katalog = KATEGORIEN.map(k => ({
    id: k.id,
    label: k.titel,
    subs: k.zeilen.map(z => ({ id: z.id, label: z.label }))
  }));
  _db.ref('moebelDropdownKatalog').set(katalog);
}

function scheduleSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(save, 700); }

function save() {
  if (!_db) return;
  setSync('syncing','Speichern…');
  _db.ref('moebel').set(_data)
    .then(()=>{ setSync('synced','Gespeichert ✓'); toast('Gespeichert ✓'); })
    .catch(e=>{ setSync('error','Fehler'); console.error(e); });
}

/* ── Direkteingabe Modal ── */
let _editKat = null, _editZeil = null;
function openEdit(katId, zeilId, label) {
  _editKat = katId; _editZeil = zeilId;
  document.getElementById('editTitle').textContent = label + ' — Bestand';
  document.getElementById('editSub').textContent   = 'Aktuell: ' + (((_data[katId]||{})[zeilId]||{}).anzahl || 0);
  const inp = document.getElementById('editInput');
  inp.value = ((_data[katId]||{})[zeilId]||{}).anzahl || 0;
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(()=>{ inp.focus(); inp.select(); }, 80);
}
function closeEdit() { document.getElementById('editOverlay').classList.remove('open'); _editKat=null; _editZeil=null; }
function confirmEdit() {
  if (!_editKat || !_editZeil) return;
  const v = Math.max(0, parseInt(document.getElementById('editInput').value)||0);
  if (!_data[_editKat]) _data[_editKat] = {};
  if (!_data[_editKat][_editZeil]) _data[_editKat][_editZeil] = { anzahl:0, notiz:'', updatedAt:'' };
  _data[_editKat][_editZeil].anzahl    = v;
  _data[_editKat][_editZeil].updatedAt = nowStr();
  updateValues(); renderSummary(); scheduleSave(); closeEdit();
}
document.getElementById('editInput').addEventListener('keydown', e => {
  if (e.key==='Enter') confirmEdit();
  if (e.key==='Escape') closeEdit();
});
document.getElementById('editOverlay').addEventListener('click', e => {
  if (e.target===document.getElementById('editOverlay')) closeEdit();
});
document.getElementById('addKatOverlay').addEventListener('click', e => {
  if (e.target===document.getElementById('addKatOverlay')) closeAddKatModal();
});
document.getElementById('newKatTitel').addEventListener('keydown', e => {
  if (e.key==='Enter') confirmAddKat();
  if (e.key==='Escape') closeAddKatModal();
});

/* ── Excel Export ── */
function exportExcel() {
  const rows = [['Kategorie','Typ / Farbe / Maße','Bestand','Status','Notiz','Geändert']];
  KATEGORIEN.forEach(kat => {
    kat.zeilen.forEach(z => {
      const d = ((_data[kat.id]||{})[z.id]) || {};
      const v = Math.max(0, Number(d.anzahl)||0);
      rows.push([kat.titel, z.label, v, v===0?'Leer':v<=5?'Wenig':'OK', d.notiz||'', d.updatedAt||'']);
    });
    rows.push(['','','','','','']);
  });
  let xmlRows = rows.map((row,ri) => {
    const cells = row.map(cell => {
      if (ri===0) return `<Cell ss:StyleID="hdr"><Data ss:Type="String">${escXml(String(cell))}</Data></Cell>`;
      if (typeof cell==='number') return `<Cell><Data ss:Type="Number">${cell}</Data></Cell>`;
      return `<Cell><Data ss:Type="String">${escXml(String(cell))}</Data></Cell>`;
    }).join('');
    return `<Row>${cells}</Row>`;
  }).join('\n');
  const xml = `<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
  <Styles>
    <Style ss:ID="hdr"><Interior ss:Color="#FF9500" ss:Pattern="Solid"/><Font ss:Bold="1" ss:Color="#FFFFFF" ss:Size="11"/></Style>
  </Styles>
  <Worksheet ss:Name="Möbel Bestand">
    <Table>
      <Column ss:Width="200"/><Column ss:Width="200"/><Column ss:Width="80"/><Column ss:Width="80"/><Column ss:Width="180"/><Column ss:Width="130"/>
      ${xmlRows}
    </Table>
  </Worksheet>
</Workbook>`;
  const datum = new Date().toLocaleDateString('de-DE').replace(/\./g,'-');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([xml],{type:'application/vnd.ms-excel;charset=utf-8'}));
  a.download = `Moebel_Bestand_${datum}.xls`;
  a.click();
  toast('Excel exportiert ✓');
}
function escXml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Toast ── */
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), 2400);
}
</script>
