<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anfragen Manager · Aktivitäts-Log</title>
<script src="../../theme.js"></script>
<link rel="stylesheet" href="../../shared.css" />
<style>
  :root { --owner-color: var(--assil-c); }
  .nav-brand .owner-tag { background: var(--assil-c); color: #fff; }
  /* Log-specific */
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .log-table th { padding: 8px 12px; text-align: left; font-size: 10px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .log-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: var(--surface2); }
  .user-badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .user-badge.louis { background: var(--accent-light); color: var(--louis-c); }
  .user-badge.rohat { background: var(--success-light); color: var(--rohat-c); }
  .user-badge.assil { background: var(--purple-light); color: var(--assil-c); }
  .action-badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--surface3); color: var(--text-2); }
  .ts-cell { color: var(--text-3); font-size: 12px; white-space: nowrap; }
  .log-count { font-size: 12px; font-weight: 600; color: var(--text-3); background: var(--surface2); border-radius: 20px; padding: 2px 9px; }
  .page-title { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .page-title h1 { font-size: 20px; font-weight: 700; }
  .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-label { font-size: 12px; font-weight: 600; color: var(--text-2); }
  .filter-chip { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-2); transition: 0.15s; }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip-alle.active  { background: var(--text); border-color: var(--text); color: var(--bg); }
  .chip-louis.active { background: var(--louis-c); border-color: var(--louis-c); color: #fff; }
  .chip-rohat.active { background: var(--rohat-c); border-color: var(--rohat-c); color: #fff; }
  .chip-assil.active { background: var(--assil-c); border-color: var(--assil-c); color: #fff; }
  .search-input { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text); outline: none; transition: 0.15s; min-width: 200px; }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .btn-danger-sm { background: none; border: 1px solid rgba(217,48,37,0.25); color: var(--danger); border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: var(--font); }
  .btn-danger-sm:hover { background: var(--danger-light); }
  .log-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .log-empty { text-align: center; padding: 40px 20px; color: var(--text-3); font-size: 14px; }

  /* ── Page layout ── */
  main { max-width: 1300px; margin: 0 auto; padding: 24px 20px 80px; display: flex; flex-direction: column; gap: 16px; }
  .page-header { display: flex; align-items: center; justify-content: space-between; }
  .page-title { display: flex; align-items: center; gap: 10px; }
  .page-title h1 { font-size: 22px; font-weight: 700; color: var(--text); }

  /* ── Log Card wrapper ── */
  .log-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }

  /* ── Table ── */
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  .log-table colgroup col:nth-child(1) { width: 110px; }
  .log-table colgroup col:nth-child(2) { width: 70px; }
  .log-table colgroup col:nth-child(3) { width: 90px; }
  .log-table colgroup col:nth-child(4) { width: 200px; }
  .log-table colgroup col:nth-child(5) { width: auto; }
  .log-table th { padding: 9px 14px; text-align: left; font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--surface2); white-space: nowrap; }
  .log-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: var(--surface2); }
  .log-date { color: var(--text-3); font-size: 12px; }
  .log-time { color: var(--text-2); font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .log-details { color: var(--text-2); font-size: 12px; }

  /* ── Date group row ── */
  .date-group-row td { padding: 6px 14px 4px; background: var(--surface2); font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }

  /* ── Aktion Badge ── */
  .aktion-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--surface3); color: var(--text-2); white-space: nowrap; }
  .aktion-badge.erstellt   { background: var(--success-light); color: var(--success); }
  .aktion-badge.geloescht  { background: var(--danger-light);  color: var(--danger); }
  .aktion-badge.archiviert { background: var(--purple-light);  color: var(--assil-c); }
  .aktion-badge.status     { background: var(--accent-light);  color: var(--accent); }
  .aktion-badge.verschoben { background: var(--warning-light); color: var(--warning); }

  /* ── Search ── */
  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-icon { position: absolute; left: 10px; color: var(--text-3); pointer-events: none; }
  .search-wrap input, #searchInput { padding: 6px 12px 6px 32px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text); outline: none; transition: 0.15s; min-width: 200px; font-family: var(--font); }
  .search-wrap input:focus, #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <a href="desktop.html" class="back-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Dashboard
    </a>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Aktivitäts-Log
    <span class="owner-tag">Assil</span>
  </div>
  <div class="nav-actions">
    <div class="sync-indicator syncing" id="syncIndicator"><div class="dot"></div><span id="syncText">Verbinden…</span></div>
    <button class="btn-danger-sm" onclick="clearLogs()">Logs löschen</button>
    <button class="dm-toggle" id="dmToggle" title="Dark Mode">
      <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun"  width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-title">
      <h1>Aktivitäts-Log</h1>
      <span class="log-count" id="logCount">0 Einträge</span>
    </div>
  </div>

  <!-- Filter + Suche -->
  <div class="filter-bar">
    <span class="filter-label">Wer:</span>
    <button class="filter-chip chip-alle active" id="fAlle"  onclick="setUserFilter('alle')">Alle</button>
    <button class="filter-chip chip-louis"       id="fLouis" onclick="setUserFilter('louis')">Louis</button>
    <button class="filter-chip chip-rohat"       id="fRohat" onclick="setUserFilter('rohat')">Rohat</button>
    <button class="filter-chip chip-assil"       id="fAssil" onclick="setUserFilter('assil')">Assil</button>
    <div class="filter-sep"></div>
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Suchen…" oninput="renderLogs()" />
    </div>
  </div>

  <!-- Log Tabelle -->
  <div class="log-card">
    <table class="log-table">
      <colgroup><col/><col/><col/><col/><col/></colgroup>
      <thead>
        <tr>
          <th>Datum</th>
          <th>Zeit</th>
          <th>Wer</th>
          <th>Aktion</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="logBody">
        <tr><td colspan="5" class="log-empty">Lade Logs…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB1-Jz8C2-Ef_4XhToct78K-YM_JFVAxmA",
  authDomain:        "manager-3cf2b.firebaseapp.com",
  databaseURL:       "https://manager-3cf2b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "manager-3cf2b",
  storageBucket:     "manager-3cf2b.firebasestorage.app",
  messagingSenderId: "55315892331",
  appId:             "1:55315892331:web:9889b92c74e535a85a892e"
};

let db       = null;
let allLogs  = [];
let userFilter = 'alle';

function setSyncStatus(type, text) {
  document.getElementById('syncIndicator').className = 'sync-indicator ' + type;
  document.getElementById('syncText').textContent = text;
}

function initFirebase() {
  try {
    const app = firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database(app);
    setSyncStatus('syncing', 'Verbinde…');
    db.ref('logs').orderByChild('ts').on('value', snap => {
      const raw = snap.val();
      allLogs = raw ? Object.values(raw).sort((a,b) => (b.ts||0) - (a.ts||0)) : [];
      renderLogs();
      setSyncStatus('synced', 'Live ✓');
    }, err => setSyncStatus('error', 'Fehler: ' + err.message));
  } catch(e) { setSyncStatus('error', 'Init-Fehler'); console.error(e); }
}

function esc(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function aktionClass(a) {
  const l = (a||'').toLowerCase();
  if (l.includes('erstellt'))   return 'erstellt';
  if (l.includes('gelöscht') || l.includes('geloscht')) return 'geloescht';
  if (l.includes('archiviert') || l.includes('abgeschlossen')) return 'archiviert';
  if (l.includes('status'))     return 'status';
  if (l.includes('verschoben')) return 'verschoben';
  return 'other';
}

function aktionIcon(a) {
  const l = (a||'').toLowerCase();
  if (l.includes('erstellt'))   return '✚';
  if (l.includes('gelöscht') || l.includes('geloscht')) return '✕';
  if (l.includes('archiviert') || l.includes('abgeschlossen')) return '✓';
  if (l.includes('status'))     return '↻';
  if (l.includes('verschoben')) return '⇄';
  return '•';
}

function setUserFilter(f) {
  userFilter = f;
  ['alle','louis','rohat','assil'].forEach(x => {
    const el = document.getElementById('f' + x.charAt(0).toUpperCase() + x.slice(1));
    if (el) el.classList.toggle('active', x === f);
  });
  renderLogs();
}

function renderLogs() {
  const tbody   = document.getElementById('logBody');
  const search  = (document.getElementById('searchInput').value || '').toLowerCase();
  const countEl = document.getElementById('logCount');

  let filtered = allLogs.filter(e => {
    if (userFilter !== 'alle' && (e.user||'').toLowerCase() !== userFilter) return false;
    if (search) {
      const hay = [e.user, e.aktion, e.details, e.datum, e.uhrzeit].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  countEl.textContent = filtered.length + ' Eintr' + (filtered.length === 1 ? 'ag' : 'äge');

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="log-empty">${allLogs.length ? 'Keine Einträge für diesen Filter.' : 'Noch keine Aktivitäten aufgezeichnet.'}</td></tr>`;
    return;
  }

  let html = '';
  let lastDate = null;

  filtered.forEach(e => {
    if (e.datum !== lastDate) {
      lastDate = e.datum;
      html += `<tr class="date-group-row"><td colspan="5">${esc(e.datum)}</td></tr>`;
    }
    const userLow  = (e.user||'').toLowerCase();
    const akCls    = aktionClass(e.aktion);
    const akIcon   = aktionIcon(e.aktion);
    html += `<tr>
      <td class="log-date">${esc(e.datum)}</td>
      <td class="log-time">${esc(e.uhrzeit||'')}</td>
      <td><span class="user-badge ${userLow}">${esc(e.user||'?')}</span></td>
      <td><span class="aktion-badge ${akCls}">${akIcon} ${esc(e.aktion)}</span></td>
      <td class="log-details" title="${esc(e.details)}">${esc(e.details||'–')}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
}

function clearLogs() {
  if (!confirm('Wirklich ALLE Logs löschen? Das kann nicht rückgängig gemacht werden.')) return;
  if (!db) return;
  db.ref('logs').remove()
    .then(() => toast('Alle Logs gelöscht ✓'))
    .catch(() => toast('Fehler beim Löschen'));
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

initFirebase();
</script>
</body>
</html>
