<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anfragen Manager · Aktivitäts-Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --surface2: #f5f5f7;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.14);
    --text: #1d1d1f; --text-secondary: #6e6e73; --text-tertiary: #aeaeb2;
    --accent: #0071e3; --danger: #ff3b30; --success: #34c759; --warning: #ff9500;
    --louis: #0071e3; --louis-light: #e8f1fb;
    --rohat: #34c759; --rohat-light: #e8f8ee;
    --assil: #7c3aed; --assil-light: #f3eeff;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  nav { background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; padding: 0 32px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
  .nav-brand .owner-tag { background: #7c3aed; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
  .nav-actions { display: flex; align-items: center; gap: 8px; }
  .back-btn { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:var(--text-secondary); text-decoration:none; padding:5px 10px; border-radius:8px; border:1px solid rgba(0,0,0,0.14); transition:0.15s ease; }
  .back-btn:hover { background:rgba(0,0,0,0.05); color:var(--text); }
  .sync-indicator { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-tertiary); padding: 5px 10px; border-radius: 20px; }
  .sync-indicator.synced { color: var(--success); }
  .sync-indicator.syncing { color: var(--warning); }
  .sync-indicator.error { color: var(--danger); }
  .sync-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  main { max-width: 960px; margin: 0 auto; padding: 28px 20px 60px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .page-title { display: flex; align-items: center; gap: 10px; }
  .page-title h1 { font-size: 20px; font-weight: 700; }
  .log-count { font-size: 12px; color: var(--text-tertiary); background: var(--surface2); border: 1px solid var(--border-strong); border-radius: 20px; padding: 3px 10px; }

  /* Filter */
  .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-label { font-size: 12px; font-weight: 600; color: var(--text-tertiary); white-space: nowrap; }
  .filter-chip { font-size: 12px; font-weight: 600; padding: 5px 13px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-secondary); transition: var(--transition); }
  .filter-chip.active.chip-louis  { background: var(--louis);  border-color: var(--louis);  color: #fff; }
  .filter-chip.active.chip-rohat  { background: var(--rohat);  border-color: var(--rohat);  color: #fff; }
  .filter-chip.active.chip-assil  { background: var(--assil);  border-color: var(--assil);  color: #fff; }
  .filter-chip.active.chip-alle   { background: var(--text-secondary); border-color: var(--text-secondary); color: #fff; }
  .filter-sep { width: 1px; height: 20px; background: var(--border-strong); margin: 0 4px; }

  /* Search */
  .search-wrap { position: relative; }
  .search-wrap input { font-family: var(--font); font-size: 13px; padding: 7px 12px 7px 34px; border-radius: 20px; border: 1px solid var(--border-strong); background: var(--surface); outline: none; width: 220px; transition: var(--transition); color: var(--text); }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.1); width: 280px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }

  /* Log table */
  .log-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .log-table thead tr { background: var(--surface2); }
  .log-table thead th { padding: 9px 14px; text-align: left; font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-strong); white-space: nowrap; }
  .log-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .log-table tbody tr:last-child { border-bottom: none; }
  .log-table tbody tr:hover { background: #fafafa; }
  .log-table td { padding: 9px 14px; vertical-align: middle; }

  .user-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; white-space: nowrap; }
  .user-badge.louis { background: var(--louis-light); color: var(--louis); }
  .user-badge.rohat { background: var(--rohat-light); color: #1a7a36; }
  .user-badge.assil { background: var(--assil-light); color: var(--assil); }

  .aktion-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 8px; white-space: nowrap; }
  .aktion-badge.erstellt    { background: #e8f8ee; color: #1a7a36; }
  .aktion-badge.geloescht   { background: #fff0f0; color: var(--danger); }
  .aktion-badge.archiviert  { background: #e8f8ee; color: #1a7a36; }
  .aktion-badge.status      { background: #e8f1fb; color: var(--accent); }
  .aktion-badge.verschoben  { background: #fff8e6; color: #b07800; }
  .aktion-badge.other       { background: var(--surface2); color: var(--text-secondary); }

  .log-details { color: var(--text-secondary); font-size: 12px; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-time { color: var(--text-tertiary); font-size: 12px; white-space: nowrap; }
  .log-date { font-weight: 600; color: var(--text-secondary); font-size: 12px; white-space: nowrap; }

  .log-empty { text-align: center; padding: 48px 20px; color: var(--text-tertiary); font-size: 14px; }
  .log-empty .icon { font-size: 36px; margin-bottom: 10px; }

  /* Date group header */
  .date-group-row td { background: var(--surface2); font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 14px; border-bottom: 1px solid var(--border-strong); }

  /* Clear button */
  .btn-danger-sm { background: transparent; border: 1px solid rgba(255,59,48,0.25); color: var(--danger); font-family: var(--font); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 8px; cursor: pointer; transition: var(--transition); }
  .btn-danger-sm:hover { background: #fff0f0; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(29,29,31,0.92); backdrop-filter: blur(12px); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <a href="desktop.html" class="back-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Dashboard
    </a>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Aktivitäts-Log
    <span class="owner-tag">Assil</span>
  </div>
  <div class="nav-actions">
    <div class="sync-indicator syncing" id="syncIndicator"><div class="dot"></div><span id="syncText">Verbinden…</span></div>
    <button class="btn-danger-sm" onclick="clearLogs()">🗑 Logs löschen</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-title">
      <span style="font-size:24px">📋</span>
      <h1>Aktivitäts-Log</h1>
      <span class="log-count" id="logCount">0 Einträge</span>
    </div>
  </div>

  <!-- Filter + Suche -->
  <div class="filter-bar">
    <span class="filter-label">Wer:</span>
    <button class="filter-chip chip-alle active" id="fAlle"  onclick="setUserFilter('alle')">Alle</button>
    <button class="filter-chip chip-louis"       id="fLouis" onclick="setUserFilter('louis')">Louis</button>
    <button class="filter-chip chip-rohat"       id="fRohat" onclick="setUserFilter('rohat')">Rohat</button>
    <button class="filter-chip chip-assil"       id="fAssil" onclick="setUserFilter('assil')">Assil</button>
    <div class="filter-sep"></div>
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Suchen…" oninput="renderLogs()" />
    </div>
  </div>

  <!-- Log Tabelle -->
  <div class="log-card">
    <table class="log-table">
      <thead>
        <tr>
          <th>Datum</th>
          <th>Zeit</th>
          <th>Wer</th>
          <th>Aktion</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="logBody">
        <tr><td colspan="5" class="log-empty"><div class="icon">⏳</div>Lade Logs…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB1-Jz8C2-Ef_4XhToct78K-YM_JFVAxmA",
  authDomain:        "manager-3cf2b.firebaseapp.com",
  databaseURL:       "https://manager-3cf2b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "manager-3cf2b",
  storageBucket:     "manager-3cf2b.firebasestorage.app",
  messagingSenderId: "55315892331",
  appId:             "1:55315892331:web:9889b92c74e535a85a892e"
};

let db       = null;
let allLogs  = [];
let userFilter = 'alle';

function setSyncStatus(type, text) {
  document.getElementById('syncIndicator').className = 'sync-indicator ' + type;
  document.getElementById('syncText').textContent = text;
}

function initFirebase() {
  try {
    const app = firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database(app);
    setSyncStatus('syncing', 'Verbinde…');
    db.ref('logs').orderByChild('ts').on('value', snap => {
      const raw = snap.val();
      allLogs = raw ? Object.values(raw).sort((a,b) => (b.ts||0) - (a.ts||0)) : [];
      renderLogs();
      setSyncStatus('synced', 'Live ✓');
    }, err => setSyncStatus('error', 'Fehler: ' + err.message));
  } catch(e) { setSyncStatus('error', 'Init-Fehler'); console.error(e); }
}

function esc(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function aktionClass(a) {
  const l = (a||'').toLowerCase();
  if (l.includes('erstellt'))   return 'erstellt';
  if (l.includes('gelöscht') || l.includes('geloscht')) return 'geloescht';
  if (l.includes('archiviert') || l.includes('abgeschlossen')) return 'archiviert';
  if (l.includes('status'))     return 'status';
  if (l.includes('verschoben')) return 'verschoben';
  return 'other';
}

function aktionIcon(a) {
  const l = (a||'').toLowerCase();
  if (l.includes('erstellt'))   return '✚';
  if (l.includes('gelöscht') || l.includes('geloscht')) return '✕';
  if (l.includes('archiviert') || l.includes('abgeschlossen')) return '✓';
  if (l.includes('status'))     return '↻';
  if (l.includes('verschoben')) return '⇄';
  return '•';
}

function setUserFilter(f) {
  userFilter = f;
  ['alle','louis','rohat','assil'].forEach(x => {
    const el = document.getElementById('f' + x.charAt(0).toUpperCase() + x.slice(1));
    if (el) el.classList.toggle('active', x === f);
  });
  renderLogs();
}

function renderLogs() {
  const tbody   = document.getElementById('logBody');
  const search  = (document.getElementById('searchInput').value || '').toLowerCase();
  const countEl = document.getElementById('logCount');

  let filtered = allLogs.filter(e => {
    if (userFilter !== 'alle' && (e.user||'').toLowerCase() !== userFilter) return false;
    if (search) {
      const hay = [e.user, e.aktion, e.details, e.datum, e.uhrzeit].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  countEl.textContent = filtered.length + ' Eintr' + (filtered.length === 1 ? 'ag' : 'äge');

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="log-empty"><div class="icon">📭</div>${allLogs.length ? 'Keine Einträge für diesen Filter.' : 'Noch keine Aktivitäten aufgezeichnet.'}</td></tr>`;
    return;
  }

  let html = '';
  let lastDate = null;

  filtered.forEach(e => {
    if (e.datum !== lastDate) {
      lastDate = e.datum;
      html += `<tr class="date-group-row"><td colspan="5">📅 ${esc(e.datum)}</td></tr>`;
    }
    const userLow  = (e.user||'').toLowerCase();
    const akCls    = aktionClass(e.aktion);
    const akIcon   = aktionIcon(e.aktion);
    html += `<tr>
      <td class="log-date">${esc(e.datum)}</td>
      <td class="log-time">${esc(e.uhrzeit||'')}</td>
      <td><span class="user-badge ${userLow}">${esc(e.user||'?')}</span></td>
      <td><span class="aktion-badge ${akCls}">${akIcon} ${esc(e.aktion)}</span></td>
      <td class="log-details" title="${esc(e.details)}">${esc(e.details||'–')}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
}

function clearLogs() {
  if (!confirm('Wirklich ALLE Logs löschen? Das kann nicht rückgängig gemacht werden.')) return;
  if (!db) return;
  db.ref('logs').remove()
    .then(() => toast('Alle Logs gelöscht ✓'))
    .catch(() => toast('Fehler beim Löschen'));
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

initFirebase();
</script>
</body>
</html>
