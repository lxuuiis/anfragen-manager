<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anfragen Manager · Asil – Übersicht</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --surface2: #f5f5f7;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.14);
    --text: #1d1d1f; --text-secondary: #6e6e73; --text-tertiary: #aeaeb2;
    --accent: #0071e3; --danger: #ff3b30; --danger-light: #fff1f0;
    --success: #34c759; --warning: #ff9500;
    --purple: #7c3aed; --purple-light: #f3eeff;
    --louis: #0071e3; --louis-light: #e8f1fb;
    --rohat: #34c759; --rohat-light: #e8f8ee;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  nav { background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; padding: 0 32px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .nav-brand .owner-tag { background: #7c3aed; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
  .nav-actions { display: flex; align-items: center; gap: 8px; }
  .sync-indicator { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-tertiary); padding: 5px 10px; border-radius: 20px; }
  .sync-indicator.synced { color: var(--success); } .sync-indicator.syncing { color: var(--warning); } .sync-indicator.error { color: var(--danger); }
  .sync-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: var(--transition); white-space: nowrap; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-strong); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  main { max-width: 1400px; margin: 0 auto; padding: 24px 20px 60px; }

  /* Setup Banner */
  .setup-banner { background: #fff8e6; border: 1px solid #ffe59e; border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; display: none; }
  .setup-banner.visible { display: block; }
  .setup-banner h3 { font-size: 13px; font-weight: 600; color: #b07800; margin-bottom: 6px; }
  .setup-banner p { font-size: 12px; color: #7a5600; line-height: 1.5; }
  .setup-banner code { background: rgba(0,0,0,0.07); padding: 1px 5px; border-radius: 4px; font-size: 11px; font-family: monospace; }

  /* Stats Bar */
  .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 18px; flex: 1; min-width: 140px; }
  .stat-card .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); margin-bottom: 4px; }
  .stat-card .value { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-card .sub { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
  .stat-louis .value { color: var(--louis); }
  .stat-rohat .value { color: var(--rohat); }
  .stat-abholung .value { color: var(--purple); }
  .stat-offen .value { color: #b07800; }

  /* Tagesübersicht */
  .day-overview { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 16px 22px; margin-bottom: 20px; }
  .day-overview-header { margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .day-overview-header h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); display: flex; align-items: center; gap: 7px; }
  .day-group { margin-bottom: 12px; } .day-group:last-child { margin-bottom: 0; }
  .day-group-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tag-count-abholung { background: var(--purple-light); color: var(--purple); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .tag-count-offen { background: #fff8e6; color: #b07800; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .abholung-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
  .abholung-item { display: flex; align-items: center; gap: 10px; background: #faf7ff; border: 1px solid #e8dffe; border-radius: 8px; padding: 6px 12px; font-size: 13px; }
  .abholung-item .zeit-badge { background: var(--purple); color: #fff; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .abholung-item .name { font-weight: 500; flex: 1; }
  .abholung-item .owner-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px; white-space: nowrap; }
  .abholung-item .owner-badge.louis { background: var(--louis-light); color: var(--louis); }
  .abholung-item .owner-badge.rohat { background: var(--rohat-light); color: #1a7a36; }
  .abholung-item .termin-info { color: var(--text-secondary); font-size: 11px; white-space: nowrap; }
  .offen-summary { display: flex; flex-wrap: wrap; gap: 5px; }
  .offen-chip { background: #fff8e6; color: #b07800; border: 1px solid #ffe59e; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
  .offen-chip .owner-dot { width: 7px; height: 7px; border-radius: 50%; }
  .day-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .overview-empty { font-size: 13px; color: var(--text-tertiary); }

  /* Owner Sections */
  .owner-section { margin-bottom: 28px; }
  .owner-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .owner-section-title { font-size: 13px; font-weight: 700; }
  .owner-badge-large { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .owner-badge-large.louis { background: var(--louis-light); color: var(--louis); }
  .owner-badge-large.rohat { background: var(--rohat-light); color: #1a7a36; }
  .section-count { font-size: 12px; color: var(--text-tertiary); background: var(--surface2); border-radius: 20px; padding: 2px 9px; }

  /* Session Cards (read-only) */
  .sessions-list { display: flex; flex-direction: column; gap: 10px; }
  .session-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
  .session-card.louis-card { border-left: 3px solid var(--louis); }
  .session-card.rohat-card { border-left: 3px solid var(--rohat); }
  .session-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .session-header:hover { background: var(--surface2); }
  .session-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .session-date { font-size: 14px; font-weight: 600; }
  .session-time { font-size: 12px; color: var(--text-secondary); }
  .session-count { font-size: 12px; color: var(--text-tertiary); background: var(--surface2); border-radius: 20px; padding: 2px 9px; }
  .collapse-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); transition: transform var(--transition); }
  .session-card.collapsed .collapse-icon { transform: rotate(-90deg); }
  .session-card.collapsed .table-wrap { display: none; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--surface2); }
  thead th { padding: 7px 10px; text-align: left; font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-strong); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody tr:nth-child(even) { background: rgba(0,0,0,0.013); }
  td { padding: 6px 10px; vertical-align: middle; font-size: 13px; }
  .td-name { min-width: 148px; font-weight: 500; } .td-status { min-width: 120px; } .td-sm { min-width: 60px; text-align: center; } .td-moebel { min-width: 120px; } .td-abh { min-width: 180px; } .td-bem { min-width: 175px; color: var(--text-secondary); }
  .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .status-offen { background: #fff8e6; color: #b07800; } .status-reservierung { background: #e8f1fb; color: #0071e3; }
  .status-abgeschlossen { background: #e8f8ee; color: #1a7a36; } .status-abholung { background: var(--purple-light); color: var(--purple); }
  .moebel-val { font-size: 12px; color: var(--text-secondary); }
  .abh-val { font-size: 12px; }
  .empty-section { text-align: center; padding: 30px; color: var(--text-tertiary); font-size: 13px; background: var(--surface); border-radius: var(--radius); border: 1px dashed var(--border-strong); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(29,29,31,0.92); backdrop-filter: blur(12px); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Filter Bar */
  .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-chip { font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-secondary); transition: var(--transition); }
  .filter-chip.active { background: var(--text); color: #fff; border-color: var(--text); }
  .filter-chip.louis-chip.active { background: var(--louis); border-color: var(--louis); }
  .filter-chip.rohat-chip.active { background: var(--rohat); border-color: var(--rohat); }
</style>
<script src="../../auth.js"></script>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
    Anfragen Manager
    <span class="owner-tag">Asil · Übersicht</span>
  </div>
  <div class="nav-actions">
    <div class="sync-indicator" id="syncIndicator"><div class="dot"></div><span id="syncText">Verbinden…</span></div>
    <button class="btn btn-ghost" onclick="exportCSVAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Gesamt-Export
    </button>
  </div>
</nav>

<main>
  <div class="setup-banner" id="setupBanner">
    <h3>⚠️ Firebase noch nicht konfiguriert</h3>
    <p>Trage deine Firebase-Konfiguration im <code>FIREBASE_CONFIG</code>-Block ein (gleiche Config wie Louis.html & Rohat.html).</p>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card stat-louis"><div class="label">Louis</div><div class="value" id="statLouis">–</div><div class="sub">Sessions</div></div>
    <div class="stat-card stat-rohat"><div class="label">Rohat</div><div class="value" id="statRohat">–</div><div class="sub">Sessions</div></div>
    <div class="stat-card stat-abholung"><div class="label">Abholungen</div><div class="value" id="statAbh">–</div><div class="sub">Gesamt</div></div>
    <div class="stat-card stat-offen"><div class="label">Offen</div><div class="value" id="statOffen">–</div><div class="sub">Personen</div></div>
  </div>

  <!-- Tagesübersicht: ALLE -->
  <div class="day-overview" id="dayOverview"></div>

  <!-- Filter -->
  <div class="filter-bar">
    <span style="font-size:12px;font-weight:600;color:var(--text-tertiary)">Anzeigen:</span>
    <button class="filter-chip louis-chip active" id="filterLouis" onclick="toggleFilter('louis')">Louis</button>
    <button class="filter-chip rohat-chip active" id="filterRohat" onclick="toggleFilter('rohat')">Rohat</button>
  </div>

  <!-- Sessions -->
  <div id="allSessions"></div>
</main>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ════════════════════════════════════════════════════════════════
// 🔧 GLEICHE FIREBASE-KONFIGURATION WIE IN LOUIS.HTML EINTRAGEN
// ════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB1-Jz8C2-Ef_4XhToct78K-YM_JFVAxmA",
  authDomain:        "manager-3cf2b.firebaseapp.com",
  databaseURL:       "https://manager-3cf2b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "manager-3cf2b",
  storageBucket:     "manager-3cf2b.firebasestorage.app",
  messagingSenderId: "55315892331",
  appId:             "1:55315892331:web:9889b92c74e535a85a892e"
};
// ════════════════════════════════════════════════════════════════

const STATUS_OPTS = ['Offen','Reservierung','Abholung','Abgeschlossen'];
let allSessions = [];
let filterState = { louis: true, rohat: true };
let asilDb = null;
let saveTimer = null;

function saveSession(sid) {
  if (!asilDb) return;
  const s = allSessions.find(x => x.id === sid);
  if (!s) return;
  setSyncStatus('syncing', 'Speichern…');
  asilDb.ref('sessions/' + sid).set(s)
    .then(() => setSyncStatus('synced', 'Gespeichert ✓'))
    .catch(() => setSyncStatus('error', 'Sync-Fehler'));
}
function upAsil(sid, pIdx, field, val) {
  const s = allSessions.find(x => x.id === sid);
  if (!s || !s.personen[pIdx]) return;
  s.personen[pIdx][field] = val;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveSession(sid), 800);
  setSyncStatus('syncing', 'Speichern…');
}

function initFirebase() {
  if (FIREBASE_CONFIG.apiKey === 'DEIN_API_KEY') {
    document.getElementById('setupBanner').classList.add('visible');
    setSyncStatus('error', '⚠️ Nicht konfiguriert');
    return;
  }
  try {
    const app = firebase.initializeApp(FIREBASE_CONFIG);
    asilDb = firebase.database(app);
    setSyncStatus('syncing', 'Verbinde…');
    asilDb.ref('sessions').on('value', snapshot => {
      const raw = snapshot.val();
      allSessions = raw ? Object.values(raw) : [];
      renderAll();
      setSyncStatus('synced', 'Live ✓');
    }, err => setSyncStatus('error', 'Fehler: ' + err.message));
  } catch(e) { setSyncStatus('error', 'Init-Fehler'); console.error(e); }
}

function setSyncStatus(type, text) { document.getElementById('syncIndicator').className='sync-indicator '+type; document.getElementById('syncText').textContent=text; }
function esc(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function isoToDE(iso) { if (!iso) return ''; const [y,m,d] = iso.split('-'); return `${d}.${m}.${y}`; }
function deToISO(de) { if (!de) return ''; const p = de.split('.'); if (p.length!==3) return ''; return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }
function fmtTime(t) { return t ? t + ' Uhr' : ''; }
function dot(s) { const c={'Offen':'#b07800','Reservierung':'#0071e3','Abgeschlossen':'#1a7a36','Abholung':'#7c3aed'}[s]||'#b07800'; return `<svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="${c}"/></svg>`; }

function toggleFilter(owner) {
  filterState[owner] = !filterState[owner];
  document.getElementById('filter' + owner.charAt(0).toUpperCase() + owner.slice(1)).classList.toggle('active', filterState[owner]);
  renderAll();
}

function renderAll() {
  updateStats();
  renderDayOverview();
  renderSessions();
}

function updateStats() {
  const louisS = allSessions.filter(s => s.owner === 'louis');
  const rohatS = allSessions.filter(s => s.owner === 'rohat');
  let abhCount = 0, offenCount = 0;
  allSessions.forEach(s => s.personen?.forEach(p => {
    if (p.name?.trim()) { if (p.status==='Abholung') abhCount++; if (p.status==='Offen') offenCount++; }
  }));
  document.getElementById('statLouis').textContent = louisS.length;
  document.getElementById('statRohat').textContent = rohatS.length;
  document.getElementById('statAbh').textContent   = abhCount;
  document.getElementById('statOffen').textContent = offenCount;
}

function renderDayOverview() {
  const box = document.getElementById('dayOverview'); if (!box) return;
  const abholMap = {}, offenMap = {};
  allSessions.forEach(s => {
    const owner = s.owner || 'unknown';
    s.personen?.forEach(p => {
      if (!p.name?.trim()) return;
      if (p.status === 'Abholung') {
        const k = p.abh_datum || s.datum;
        if (!abholMap[k]) abholMap[k] = [];
        abholMap[k].push({ name: p.name, zeit: p.abh_zeit, termin: s.datum+' '+s.uhrzeit, owner });
      }
      if (p.status === 'Offen') {
        if (!offenMap[s.datum]) offenMap[s.datum] = [];
        offenMap[s.datum].push({ name: p.name, termin: s.uhrzeit, owner });
      }
    });
  });
  const allDays = [...new Set([...Object.keys(abholMap),...Object.keys(offenMap)])].sort((a,b)=>deToISO(a).localeCompare(deToISO(b)));
  if (!allDays.length) { box.innerHTML='<div class="day-overview-header"><h2>📅 Tagesübersicht – Alle</h2></div><p class="overview-empty">Keine offenen Einträge oder Abholungen.</p>'; return; }
  let html = '<div class="day-overview-header"><h2>📅 Tagesübersicht – Alle Mitarbeiter</h2></div>';
  allDays.forEach((datum, di) => {
    if (di>0) html+='<hr class="day-divider">'; const abh=abholMap[datum]||[],off=offenMap[datum]||[];
    html+=`<div class="day-group"><div class="day-group-title">📅 ${esc(datum)}`;
    if(abh.length) html+=` <span class="tag-count-abholung">🚚 ${abh.length} Abholung${abh.length!==1?'en':''}</span>`;
    if(off.length) html+=` <span class="tag-count-offen">${off.length} Offen</span>`;
    html+='</div>';
    if(abh.length) {
      html+='<div class="abholung-list">';
      [...abh].sort((a,b)=>(a.zeit||'').localeCompare(b.zeit||'')).forEach(a=>{
        html+=`<div class="abholung-item"><span class="zeit-badge">${esc(a.zeit?fmtTime(a.zeit):'– Zeit offen –')}</span><span class="name">${esc(a.name)}</span><span class="owner-badge ${a.owner}">${a.owner==='louis'?'Louis':'Rohat'}</span><span class="termin-info">Termin: ${esc(a.termin)}</span></div>`;
      });
      html+='</div>';
    }
    if(off.length) {
      if(abh.length) html+='<div style="height:6px"></div>';
      html+=`<div style="font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px">Noch offen (${off.length})</div><div class="offen-summary">`;
      off.forEach(o=>{
        const color = o.owner==='louis'?'#0071e3':'#34c759';
        html+=`<span class="offen-chip"><span class="owner-dot" style="background:${color}"></span>${esc(o.name)} <span style="opacity:0.6">· ${esc(o.termin)}</span></span>`;
      });
      html+='</div>';
    }
    html+='</div>';
  });
  box.innerHTML = html;
}

function renderSessions() {
  const container = document.getElementById('allSessions');
  container.innerHTML = '';
  ['louis','rohat'].forEach(owner => {
    if (!filterState[owner]) return;
    const ownerSessions = allSessions.filter(s => s.owner === owner).sort((a,b) => deToISO(a.datum).localeCompare(deToISO(b.datum)));
    const section = document.createElement('div');
    section.className = 'owner-section';
    const name = owner === 'louis' ? 'Louis' : 'Rohat';
    section.innerHTML = `<div class="owner-section-header"><span class="owner-section-title">Termine von ${name}</span><span class="owner-badge-large ${owner}">${name}</span><span class="section-count">${ownerSessions.length} Termine</span></div>`;
    if (!ownerSessions.length) {
      section.innerHTML += `<div class="empty-section">Noch keine Termine von ${name}</div>`;
    } else {
      const list = document.createElement('div'); list.className = 'sessions-list';
      ownerSessions.forEach(s => list.appendChild(buildReadOnlyCard(s, owner)));
      section.appendChild(list);
    }
    container.appendChild(section);
  });
}

function buildReadOnlyCard(s, owner) {
  const card = document.createElement('div');
  card.className = `session-card ${owner}-card` + (s.collapsed ? ' collapsed' : '');
  card.dataset.id = s.id;
  const cnt = s.personen?.filter(p => p.name?.trim()).length || 0;
  const personen = s.personen || [];
  const rows = personen.filter(p => p.name?.trim()).map((p, pIdx) => {
    const cls = {'Offen':'status-offen','Reservierung':'status-reservierung','Abgeschlossen':'status-abgeschlossen','Abholung':'status-abholung'}[p.status]||'status-offen';
    const isAbh = p.status === 'Abholung';
    const abhISO = p.abh_datum ? deToISO(p.abh_datum) : '';
    const moebel = [];
    if (p.tische) moebel.push(p.tische + ' Tisch' + (p.tische!==1?'e':''));
    if (p.stuehle) moebel.push(p.stuehle + ' Stuhl/Stühle');
    // Abholung-Zelle: editierbar wenn status=Abholung, sonst "–"
    const abhCell = isAbh
      ? `<div style="display:flex;align-items:center;gap:4px">
           <input type="date" value="${abhISO}" style="width:120px;font-size:11px;padding:3px 6px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface2);font-family:var(--font);cursor:pointer"
             onchange="upAsil(${s.id},${pIdx},'abh_datum',isoToDE(this.value))" title="Abholdatum" />
           <input type="time" value="${esc(p.abh_zeit||'')}" style="width:70px;font-size:11px;padding:3px 6px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface2);font-family:var(--font);cursor:pointer"
             onchange="upAsil(${s.id},${pIdx},'abh_zeit',this.value)" title="Abholzeit" />
         </div>`
      : '<span style="color:var(--text-tertiary)">–</span>';
    return `<tr>
      <td class="td-name">${esc(p.name)}</td>
      <td class="td-status"><span class="status-badge ${cls}">${dot(p.status)} ${esc(p.status)}</span></td>
      <td class="td-sm">${p.fe||'–'}</td>
      <td class="td-sm">${p.fw||'–'}</td>
      <td class="td-moebel"><span class="moebel-val">${moebel.length?moebel.join(', '):'–'}</span></td>
      <td class="td-abh">${abhCell}</td>
      <td class="td-bem">${esc(p.bem||'')}</td>
    </tr>`;
  }).join('');

  card.innerHTML = `
    <div class="session-header" onclick="toggleCard(${s.id})">
      <div class="session-meta">
        <span class="session-date">${esc(s.datum)}</span>
        <span class="session-time">${esc(s.uhrzeit)}</span>
        <span class="session-count">${cnt} Person${cnt!==1?'en':''}</span>
      </div>
      <div class="collapse-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th class="td-name">Name</th><th class="td-status">Status</th>
        <th class="td-sm">Form.<br>erh.</th><th class="td-sm">Form.<br>weit.</th>
        <th class="td-moebel">Möbel</th>
        <th class="td-abh" style="color:var(--purple)">Abholung</th>
        <th class="td-bem">Bemerkung</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  return card;
}

function toggleCard(id) {
  const card = document.querySelector(`.session-card[data-id="${id}"]`);
  if (card) card.classList.toggle('collapsed');
}

function exportCSVAll() {
  const bom = '\uFEFF', lines = ['Anfragen Gesamt-Export (Asil)\n'];
  ['louis','rohat'].forEach(owner => {
    const ownerSessions = allSessions.filter(s => s.owner === owner);
    if (!ownerSessions.length) return;
    lines.push('=== ' + (owner==='louis'?'LOUIS':'ROHAT') + ' ===');
    ownerSessions.forEach(s => {
      lines.push('Datum: '+s.datum+' | Uhrzeit: '+s.uhrzeit);
      lines.push('Name,Status,Abholdatum,Abholzeit,Formular erhalten,Formular weitergeleitet,Tische,Stühle,Bemerkung');
      s.personen?.filter(p=>p.name?.trim()).forEach(p=>{
        lines.push([p.name,p.status,p.abh_datum||'',p.abh_zeit?fmtTime(p.abh_zeit):'',p.fe,p.fw,p.tische||0,p.stuehle||0,p.bem||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
      });
      lines.push('');
    });
    lines.push('');
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([bom+lines.join('\n')],{type:'text/csv;charset=utf-8;'}));
  a.download = 'Anfragen_Gesamt.csv'; a.click();
  toast('Gesamt-CSV exportiert ✓');
}

let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2400);}

initFirebase();
