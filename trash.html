<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Papierkorb · Anfragen Manager</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="shared.css" />
<style>
  main { max-width: 900px; margin: 0 auto; padding: 28px 18px 80px; display: flex; flex-direction: column; gap: 20px; }
  .trash-empty { text-align: center; padding: 60px 20px; color: var(--text-3); }
  .trash-empty svg { margin-bottom: 14px; opacity: 0.3; }
  .trash-empty p { font-size: 15px; }
  .trash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; box-shadow: var(--shadow-sm); }
  .trash-card:hover { border-color: var(--border-strong); }
  .trash-info { flex: 1; }
  .trash-meta { font-size: 11px; color: var(--text-3); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .trash-owner { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 20px; }
  .owner-louis { background: var(--accent-light); color: var(--accent); }
  .owner-rohat { background: var(--success-light); color: var(--success); }
  .owner-assil  { background: var(--purple-light); color: var(--assil-c); }
  .trash-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .trash-persons { font-size: 13px; color: var(--text-2); }
  .trash-expires { font-size: 11px; color: var(--warning); font-weight: 600; margin-top: 5px; }
  .trash-expires.urgent { color: var(--danger); }
  .trash-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
  .btn-restore { display: flex; align-items: center; gap: 5px; background: var(--success); color: #fff; border: none; border-radius: var(--radius-sm); padding: 7px 13px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: 0.12s; white-space: nowrap; }
  .btn-restore:hover { filter: brightness(1.1); }
  .btn-perm-del { display: flex; align-items: center; gap: 5px; background: none; color: var(--danger); border: 1px solid rgba(217,48,37,0.25); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: 0.12s; white-space: nowrap; }
  .btn-perm-del:hover { background: var(--danger-light); }
  .hint-bar { background: var(--warning-light); border: 1px solid var(--warning); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--warning); display: flex; align-items: center; gap: 8px; }
  .loading { text-align: center; padding: 40px; color: var(--text-3); font-size: 14px; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <a href="index.html" class="back-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Übersicht
    </a>
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    Papierkorb
  </div>
  <div class="nav-actions">
    <div class="sync-indicator" id="syncIndicator"><div class="dot"></div><span id="syncText">Verbinde…</span></div>
    <button class="btn btn-danger" id="emptyTrashBtn" onclick="emptyTrash()" style="display:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      Alles endgültig löschen
    </button>
    <button class="dm-toggle" id="dmToggle" title="Dark Mode">
      <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun"  width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</nav>

<main>
  <div class="hint-bar">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Gelöschte Termine bleiben <strong>&nbsp;30 Tage&nbsp;</strong> im Papierkorb und können wiederhergestellt werden.
  </div>
  <div id="trashList"><p class="loading">Lädt…</p></div>
</main>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyB1-Jz8C2-Ef_4XhToct78K-YM_JFVAxmA",
  authDomain:        "manager-3cf2b.firebaseapp.com",
  databaseURL:       "https://manager-3cf2b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "manager-3cf2b",
  storageBucket:     "manager-3cf2b.appspot.com",
  messagingSenderId: "55315892331",
  appId:             "1:55315892331:web:9889b92c74e535a85a892e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;

// Sync-Indikator
function setSyncStatus(state, text) {
  const ind = document.getElementById('syncIndicator');
  const txt = document.getElementById('syncText');
  if (!ind || !txt) return;
  ind.className = 'sync-indicator ' + state;
  txt.textContent = text;
}

let _items = {};

db.ref('trash').on('value', snap => {
  _items = snap.val() || {};
  setSyncStatus('synced', 'Verbunden ✓');
  render();
}, () => setSyncStatus('error', 'Fehler'));

function daysAgo(ts) {
  return Math.floor((Date.now() - ts) / (1000 * 60 * 60 * 24));
}
function daysLeft(ts) {
  return Math.max(0, 30 - daysAgo(ts));
}

function render() {
  const list = document.getElementById('trashList');
  const btn = document.getElementById('emptyTrashBtn');
  const entries = Object.values(_items);

  // Automatisch abgelaufene Einträge (>30 Tage) löschen
  entries.forEach(e => {
    if (e._trashedAt && Date.now() - e._trashedAt > THIRTY_DAYS) {
      db.ref('trash/' + e._trashId).remove();
    }
  });

  const valid = entries.filter(e => !e._trashedAt || Date.now() - e._trashedAt <= THIRTY_DAYS);
  valid.sort((a, b) => (b._trashedAt || 0) - (a._trashedAt || 0));

  btn.style.display = valid.length ? '' : 'none';

  if (!valid.length) {
    list.innerHTML = `
      <div class="trash-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        <p>Papierkorb ist leer</p>
      </div>`;
    return;
  }

  list.innerHTML = valid.map(e => {
    const owner = (e.owner || e._trashedBy || '?').toLowerCase();
    const ownerLabel = e.owner ? (e.owner.charAt(0).toUpperCase() + e.owner.slice(1)) : (e._trashedBy || '?');
    const persons = (e.personen || []).filter(p => p.name && p.name.trim());
    const personNames = persons.length ? persons.map(p => p.name).join(', ') : '(keine Personen)';
    const left = daysLeft(e._trashedAt || 0);
    const ago = daysAgo(e._trashedAt || 0);
    const expiresClass = left <= 3 ? 'trash-expires urgent' : 'trash-expires';
    const trashedDate = e._trashedAt ? new Date(e._trashedAt).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '?';
    return `
      <div class="trash-card" id="tc-${e._trashId}">
        <div class="trash-info">
          <div class="trash-meta">
            <span class="trash-owner owner-${owner}">${ownerLabel}</span>
            <span>Gelöscht: ${trashedDate}</span>
          </div>
          <div class="trash-title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="margin-right:5px;opacity:0.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${e.datum || '?'} · ${e.uhrzeit || '?'}
          </div>
          <div class="trash-persons">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="margin-right:4px;opacity:0.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            ${personNames}
          </div>
          <div class="${expiresClass}">
            ${left === 0 ? '⚠ Wird heute endgültig gelöscht' : `Wird in ${left} Tag${left === 1 ? '' : 'en'} endgültig gelöscht`}
          </div>
        </div>
        <div class="trash-actions">
          <button class="btn-restore" onclick="restore('${e._trashId}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.07"/></svg>
            Wiederherstellen
          </button>
          <button class="btn-perm-del" onclick="permDelete('${e._trashId}')">
            Endgültig löschen
          </button>
        </div>
      </div>`;
  }).join('');
}

function restore(trashId) {
  const e = _items[trashId]; if (!e) return;
  // Bestimme den richtigen sessions-Pfad basierend auf owner
  const owner = (e.owner || e._trashedBy || '').toLowerCase();
  const sessionId = e.id || trashId.replace('trash_', '');

  // Kopie ohne Papierkorb-Metadaten
  const restored = {...e};
  delete restored._trashedAt;
  delete restored._trashedBy;
  delete restored._trashId;

  db.ref('sessions/' + sessionId).set(restored)
    .then(() => {
      db.ref('trash/' + trashId).remove();
      showToast(`${e.datum || 'Termin'} wiederhergestellt ✓`);
    })
    .catch(err => showToast('Fehler: ' + err.message));
}

function permDelete(trashId) {
  const e = _items[trashId]; if (!e) return;
  const name = e.datum ? `${e.datum} · ${e.uhrzeit}` : trashId;
  if (!confirm(`„${name}" endgültig löschen? Dies kann nicht rückgängig gemacht werden.`)) return;
  db.ref('trash/' + trashId).remove();
  showToast('Endgültig gelöscht');
}

function emptyTrash() {
  if (!confirm('Alle Einträge im Papierkorb endgültig löschen? Dies kann nicht rückgängig gemacht werden.')) return;
  db.ref('trash').remove();
  showToast('Papierkorb geleert');
}

let _toastTimer;
function showToast(msg) {
  let el = document.getElementById('trashToast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'trashToast';
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
