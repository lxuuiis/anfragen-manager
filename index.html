<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anfragen Manager &middot; &Uuml;bersicht</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --surface2: #f5f5f7;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.14);
    --text: #1d1d1f; --text-secondary: #6e6e73; --text-tertiary: #aeaeb2;
    --danger: #ff3b30; --success: #34c759; --warning: #ff9500;
    --purple: #7c3aed; --purple-light: #f3eeff;
    --louis: #0071e3; --louis-light: #e8f1fb;
    --rohat: #34c759; --rohat-light: #e8f8ee;
    --assil: #ff9500; --assil-light: #fff8e6;
    --radius: 14px; --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    --tr: 0.18s cubic-bezier(0.4,0,0.2,1);
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* NAV */
  nav { background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; padding: 0 28px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .sync-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; padding: 4px 10px; border-radius: 20px; color: var(--text-tertiary); }
  .sync-badge.synced { color: var(--success); }
  .sync-badge.error  { color: var(--danger); }
  .sync-badge .dot   { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 28px 18px 80px; display: flex; flex-direction: column; gap: 28px; }

  /* SECTION HEADER */
  .sec-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }

  /* PERSON CARDS */
  .person-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  @media (max-width:720px) { .person-grid { grid-template-columns: 1fr; } }
  @media (max-width:960px) and (min-width:721px) { .person-grid { grid-template-columns: 1fr 1fr; } }

  .pcard { background: var(--surface); border-radius: 18px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 20px 22px 18px; display: flex; flex-direction: column; gap: 14px; position: relative; overflow: hidden; transition: transform var(--tr), box-shadow var(--tr); }
  .pcard::before { content:''; position: absolute; top:0; left:0; right:0; height:3px; background: var(--c); }
  .pcard:hover { transform: translateY(-3px); box-shadow: 0 6px 28px rgba(0,0,0,0.10); }

  .pcard-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .pcard-icon { width: 42px; height: 42px; border-radius: 50%; background: var(--cl); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .pcard-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; background: var(--cl); color: var(--c); }
  .pcard-name { font-size: 21px; font-weight: 700; letter-spacing: -0.3px; }
  .pcard-sub  { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .pcard-stats { display: flex; gap: 7px; flex-wrap: wrap; }
  .stat-pill { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border-strong); border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 500; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }
  .pcard-links { display: flex; flex-direction: column; gap: 7px; }
  .plink { display: flex; align-items: center; justify-content: space-between; background: var(--cl); border-radius: 10px; padding: 9px 13px; font-size: 13px; font-weight: 600; color: var(--c); text-decoration: none; transition: filter var(--tr); }
  .plink:hover { filter: brightness(0.94); }
  .plink span { display: flex; align-items: center; gap: 6px; }

  .card-louis { --c: var(--louis); --cl: var(--louis-light); }
  .card-rohat { --c: var(--rohat); --cl: var(--rohat-light); }
  .card-assil { --c: var(--assil); --cl: var(--assil-light); }

  /* ABHOLUNGEN */
  .panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .panel-head:hover { background: var(--surface2); }
  .panel-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .chevron { color: var(--text-tertiary); transition: transform var(--tr); }
  .panel.closed .chevron { transform: rotate(-90deg); }
  .panel.closed .panel-body { display: none; }
  .panel-body { padding: 0 20px 18px; }

  .total-badge { background: var(--purple-light); color: var(--purple); font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }

  .abh-day { margin-top: 16px; }
  .day-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .today-chip { background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .abh-rows { display: flex; flex-direction: column; gap: 6px; }
  .abh-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border-strong); border-radius: 10px; padding: 8px 14px; }
  .abh-row.is-today { background: #fff5f5; border-color: rgba(255,59,48,0.22); }
  .zeit-tag { background: var(--purple); color: #fff; border-radius: 6px; padding: 2px 9px; font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .abh-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .abh-termin { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
  .owner-chip { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
  .owner-chip.louis { background: var(--louis-light); color: var(--louis); }
  .owner-chip.rohat { background: var(--rohat-light); color: var(--rohat); }

  /* pulsierender Punkt */
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); flex-shrink: 0; animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.35;transform:scale(1.6);} }

  /* ARCHIV */
  .archiv-count { background: var(--surface2); border: 1px solid var(--border-strong); color: var(--text-secondary); font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; }
  .archiv-filters { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 4px; padding-top: 14px; }
  .fb { background: var(--surface2); border: 1px solid var(--border-strong); border-radius: 20px; padding: 4px 13px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); color: var(--text-secondary); transition: var(--tr); }
  .fb.on      { color:#fff; border-color:transparent; background: #1d1d1f; }
  .fb.on.louis { background: var(--louis); }
  .fb.on.rohat { background: var(--rohat); }
  .archiv-list { display: flex; flex-direction: column; gap: 12px; padding-top: 12px; }
  .archiv-empty { font-size: 13px; color: var(--text-tertiary); text-align: center; padding: 24px; }

  .a-card { border: 1px solid var(--border-strong); border-radius: var(--radius-sm); overflow: hidden; animation: fadein 0.2s ease; }
  @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .a-card-head { background: var(--surface2); padding: 9px 15px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .a-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .a-datum { font-size: 12px; font-weight: 600; }
  .a-done  { font-size: 11px; color: var(--success); font-weight: 600; }
  .a-am    { font-size: 11px; color: var(--text-tertiary); }
  .a-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .a-table th { padding: 6px 11px; text-align: left; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-secondary); background: var(--surface2); border-bottom: 1px solid var(--border); white-space: nowrap; }
  .a-table td { padding: 7px 11px; border-bottom: 1px solid var(--border); }
  .a-table tr:last-child td { border-bottom: none; }
  .a-table tr:hover td { background: #fafafa; }
  .a-table .nm { font-weight: 500; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(29,29,31,0.92); backdrop-filter: blur(12px); color:#fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<script>
const FB_CFG = {
  apiKey:            "AIzaSyB1-Jz8C2-Ef_4XhToct78K-YM_JFVAxmA",
  authDomain:        "manager-3cf2b.firebaseapp.com",
  databaseURL:       "https://manager-3cf2b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "manager-3cf2b",
  storageBucket:     "manager-3cf2b.firebasestorage.app",
  messagingSenderId: "55315892331",
  appId:             "1:55315892331:web:9889b92c74e535a85a892e"
};

let _sessions = [];
let _archiv   = [];
let _filter   = 'all';

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function datumSort(d) {
  if (!d) return Infinity;
  const p = String(d).split('.');
  if (p.length < 2) return Infinity;
  const dd = parseInt(p[0])||0, mm = parseInt(p[1])||0, yy = parseInt(p[2])||2026;
  return yy*10000 + mm*100 + dd;
}

function isToday(datum) {
  if (!datum) return false;
  const p = String(datum).split('.');
  const n = new Date();
  return parseInt(p[0]) === n.getDate() &&
         parseInt(p[1]) === (n.getMonth()+1) &&
         (!p[2] || parseInt(p[2]) === n.getFullYear());
}

function ownerLabel(o) { return o === 'louis' ? 'Louis' : o === 'rohat' ? 'Rohat' : o || '–'; }

function setSyncStatus(type, txt) {
  const b = document.getElementById('syncBadge');
  b.className = 'sync-badge ' + type;
  document.getElementById('syncTxt').textContent = txt;
}

// ─── Firebase ─────────────────────────────────────────────────────────────────
(function initFB() {
  try {
    const app = firebase.initializeApp(FB_CFG);
    const db  = firebase.database(app);
    setSyncStatus('', 'Verbinde…');

    db.ref('sessions').on('value', snap => {
      _sessions = snap.val() ? Object.values(snap.val()) : [];
      renderPersonCards();
      renderAbholungen();
      setSyncStatus('synced', 'Live ✓');
    }, () => setSyncStatus('error', 'Fehler'));

    db.ref('archiv').on('value', snap => {
      _archiv = snap.val() ? Object.values(snap.val()) : [];
      renderArchiv();
    });
  } catch(e) { setSyncStatus('error', 'Init-Fehler'); console.error(e); }
})();

// ─── Person-Karten ────────────────────────────────────────────────────────────
function renderPersonCards() {
  ['louis','rohat'].forEach(function(owner) {
    const ss = _sessions.filter(function(x){ return x.owner === owner; });
    const total = ss.length;
    const offen = ss.reduce(function(n,x){ return n + (x.personen||[]).filter(function(p){ return p.name && p.name.trim() && p.status === 'Offen'; }).length; }, 0);
    const res   = ss.reduce(function(n,x){ return n + (x.personen||[]).filter(function(p){ return p.name && p.name.trim() && p.status === 'Reservierung'; }).length; }, 0);
    const abh   = ss.reduce(function(n,x){ return n + (x.personen||[]).filter(function(p){ return p.name && p.name.trim() && p.status === 'Abholung'; }).length; }, 0);
    var pre = owner === 'louis' ? 'l' : 'r';
    document.getElementById(pre+'-sub').textContent = total + ' Termin' + (total!==1?'e':'');
    document.getElementById(pre+'-stats').innerHTML =
      '<div class="stat-pill"><span class="stat-dot" style="background:#b07800"></span>' + offen + ' Offen</div>' +
      '<div class="stat-pill"><span class="stat-dot" style="background:#0071e3"></span>' + res + ' Reserv.</div>' +
      '<div class="stat-pill"><span class="stat-dot" style="background:#7c3aed"></span>' + abh + ' Abholung</div>';
  });
  var total = _sessions.length;
  var aOffen = _sessions.reduce(function(n,x){ return n + (x.personen||[]).filter(function(p){ return p.name && p.name.trim() && p.status==='Offen'; }).length; }, 0);
  var aAbh   = _sessions.reduce(function(n,x){ return n + (x.personen||[]).filter(function(p){ return p.name && p.name.trim() && p.status==='Abholung'; }).length; }, 0);
  document.getElementById('a-sub').textContent = total + ' Termine gesamt';
  document.getElementById('a-stats').innerHTML =
    '<div class="stat-pill"><span class="stat-dot" style="background:#b07800"></span>' + aOffen + ' Offen</div>' +
    '<div class="stat-pill"><span class="stat-dot" style="background:#7c3aed"></span>' + aAbh + ' Abholung</div>';
}

// ─── Abholungen ───────────────────────────────────────────────────────────────
function renderAbholungen() {
  var byDate = {};
  var noDatum = [];

  _sessions.forEach(function(s) {
    (s.personen || []).forEach(function(p) {
      if (!p.name || !p.name.trim() || p.status !== 'Abholung') return;
      var entry = {
        name:   p.name,
        zeit:   p.abh_zeit  || '',
        datum:  p.abh_datum || '',
        termin: esc(s.datum) + (s.uhrzeit ? ' · ' + esc(s.uhrzeit) : ''),
        owner:  s.owner || ''
      };
      if (p.abh_datum && p.abh_datum.trim()) {
        if (!byDate[p.abh_datum]) byDate[p.abh_datum] = [];
        byDate[p.abh_datum].push(entry);
      } else {
        noDatum.push(entry);
      }
    });
  });

  var dates = Object.keys(byDate).sort(function(a,b){ return datumSort(a) - datumSort(b); });
  var total = dates.reduce(function(n,k){ return n + byDate[k].length; }, 0) + noDatum.length;
  document.getElementById('abhTotal').textContent = total;

  if (!total) {
    document.getElementById('abhBody').innerHTML = '<p style="font-size:13px;color:var(--text-tertiary);padding:18px 0;text-align:center">Keine Abholungen eingetragen.</p>';
    return;
  }

  var html = '';

  dates.forEach(function(datum) {
    var today = isToday(datum);
    var items = byDate[datum].slice().sort(function(a,b){ return (a.zeit||'').localeCompare(b.zeit||''); });
    html += '<div class="abh-day">';
    html += '<div class="day-label">';
    if (today) html += '<div class="pulse"></div>';
    html += '&#x1F4C5; ' + esc(datum);
    if (today) html += ' <span class="today-chip">Heute</span>';
    html += '</div><div class="abh-rows">';
    items.forEach(function(e) {
      html += '<div class="abh-row' + (today ? ' is-today' : '') + '">';
      html += '<span class="zeit-tag">' + (e.zeit ? esc(e.zeit) + ' Uhr' : '–') + '</span>';
      html += '<span class="abh-name">' + esc(e.name) + '</span>';
      html += '<span class="abh-termin">Termin: ' + e.termin + '</span>';
      html += '<span class="owner-chip ' + esc(e.owner) + '">' + ownerLabel(e.owner) + '</span>';
      if (today) html += '<div class="pulse"></div>';
      html += '</div>';
    });
    html += '</div></div>';
  });

  if (noDatum.length) {
    html += '<div class="abh-day">';
    html += '<div class="day-label">&#x1F4C5; Datum noch offen</div>';
    html += '<div class="abh-rows">';
    noDatum.forEach(function(e) {
      html += '<div class="abh-row">';
      html += '<span class="zeit-tag" style="background:var(--text-tertiary)">– offen –</span>';
      html += '<span class="abh-name">' + esc(e.name) + '</span>';
      html += '<span class="abh-termin">Termin: ' + e.termin + '</span>';
      html += '<span class="owner-chip ' + esc(e.owner) + '">' + ownerLabel(e.owner) + '</span>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  document.getElementById('abhBody').innerHTML = html;
}

// ─── Archiv ───────────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  _filter = f;
  document.querySelectorAll('.fb').forEach(function(b) { b.classList.remove('on','louis','rohat'); });
  btn.classList.add('on');
  if (f !== 'all') btn.classList.add(f);
  renderArchiv();
}

function renderArchiv() {
  var countEl = document.getElementById('archivCount');
  var listEl  = document.getElementById('archivList');
  if (!countEl || !listEl) return;

  countEl.textContent = _archiv.length + ' Eintr' + (_archiv.length === 1 ? 'ag' : 'äge');
  var data = _filter === 'all' ? _archiv : _archiv.filter(function(e){ return e.owner === _filter; });

  if (!data.length) {
    listEl.innerHTML = '<p class="archiv-empty">Keine Eintr&auml;ge vorhanden.</p>';
    return;
  }

  // Gruppieren
  var grouped = {};
  data.slice().sort(function(a,b){ return (b.archiviertAm||'').localeCompare(a.archiviertAm||''); })
    .forEach(function(e) {
      var key = (e.archiviertAm||'') + '|' + (e.terminDatum||'') + '|' + (e.terminUhrzeit||'') + '|' + (e.owner||'');
      if (!grouped[key]) grouped[key] = { archiviertAm: e.archiviertAm, terminDatum: e.terminDatum, terminUhrzeit: e.terminUhrzeit, owner: e.owner, items: [] };
      grouped[key].items.push(e);
    });

  var html = '';
  Object.values(grouped).forEach(function(g) {
    var rows = g.items.map(function(e) {
      return '<tr>' +
        '<td class="nm">' + esc(e.name||'–') + '</td>' +
        '<td>' + esc(e.fe||'–') + '</td>' +
        '<td>' + esc(e.fw||'–') + '</td>' +
        '<td>' + (e.tische||0) + ' · ' + (e.stuehle||0) + '</td>' +
        '<td>' + esc(e.abh_datum||'–') + (e.abh_zeit ? ' ' + esc(e.abh_zeit) + ' Uhr' : '') + '</td>' +
        '<td>' + esc(e.bem||'–') + '</td>' +
        '</tr>';
    }).join('');

    html += '<div class="a-card">' +
      '<div class="a-card-head">' +
        '<div class="a-card-meta">' +
          '<span class="a-datum">&#x1F4C5; ' + esc(g.terminDatum||'–') + ' · ' + esc(g.terminUhrzeit||'') + '</span>' +
          '<span class="owner-chip ' + esc(g.owner) + '">' + ownerLabel(g.owner) + '</span>' +
          '<span class="a-done">✓ Abgeschlossen</span>' +
        '</div>' +
        '<span class="a-am">Archiviert: ' + esc(g.archiviertAm||'–') + '</span>' +
      '</div>' +
      '<table class="a-table">' +
        '<thead><tr><th>Name</th><th>Form. erh.</th><th>Form. weit.</th><th>Ti · St</th><th>Abholung</th><th>Bemerkung</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>';
  });

  listEl.innerHTML = html;
}

// ─── Toast ────────────────────────────────────────────────────────────────────
var _tt;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(function(){ el.classList.remove('show'); }, 2400);
}
</script>
