<style>
  main { max-width: 1300px; margin: 0 auto; padding: 24px 20px 80px; display: flex; flex-direction: column; gap: 20px; }

  /* ── Summary Strip ── */
  .summary-strip { display: flex; gap: 10px; flex-wrap: wrap; }
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; min-width: 140px; flex: 1; box-shadow: var(--shadow-sm); }
  .sum-card.ok   { border-left: 3px solid var(--success); }
  .sum-card.warn { border-left: 3px solid var(--danger); }
  .s-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); margin-bottom: 5px; }
  .s-num { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .s-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

  /* ── Kategorie-Karte ── */
  .kat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .kat-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .kat-emoji { font-size: 16px; flex-shrink: 0; }
  .kat-title { font-size: 14px; font-weight: 700; flex: 1; color: var(--text); }
  .kat-gesamtbadge { font-size: 11px; font-weight: 700; color: var(--text-2); background: var(--surface3); border-radius: 20px; padding: 2px 9px; white-space: nowrap; }

  /* ── Tabelle ── */
  .tbl-wrap { overflow-x: auto; }
  .mtbl { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; min-width: 700px; }
  .mtbl col.c-name    { width: auto; }
  .mtbl col.c-bestand { width: 140px; }
  .mtbl col.c-status  { width: 120px; }
  .mtbl col.c-ts      { width: 130px; }
  .mtbl thead th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-3); padding: 8px 14px; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface2); white-space: nowrap; }
  .mtbl tbody tr:hover td { background: var(--surface2); }
  .mtbl td { padding: 8px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; overflow: hidden; }
  .mtbl tbody tr:last-child td { border-bottom: none; }

  /* ── Farb-Chip ── */
  .fchip { display: flex; align-items: center; gap: 7px; font-weight: 500; color: var(--text); }

  /* ── Stepper ── */
  .stepper { display: flex; align-items: center; gap: 6px; }
  .s-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; color: var(--text-2); transition: 0.12s; flex-shrink: 0; }
  .s-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .s-val { font-size: 15px; font-weight: 700; width: 36px; text-align: center; color: var(--text); cursor: pointer; border-radius: 6px; padding: 2px 0; transition: 0.12s; }
  .s-val:hover { background: var(--accent-light); color: var(--accent); }
  .s-val.zero { color: var(--text-3); }

  /* ── Status-Badge ── */
  .sbadge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .sbadge.ok     { background: var(--success-light); color: var(--success); }
  .sbadge.leer   { background: var(--danger-light);  color: var(--danger); }
  .sbadge.mittel { background: var(--warning-light); color: var(--warning); }
  .sbadge.viel   { background: var(--success-light); color: var(--success); }

  /* ── Timestamp ── */
  .ts { font-size: 11px; color: var(--text-3); white-space: nowrap; }

  /* ── Reserviert / Verfügbar Spalten ── */
  .mtbl col.c-reserviert { width: 100px; }
  .mtbl col.c-verfuegbar { width: 120px; }
  .res-badge { font-size:11px; font-weight:600; color:#b07800; background:#fff8e6; border-radius:20px; padding:2px 8px; white-space:nowrap; }
  .res-badge.none { color:var(--text-3); background:none; font-weight:400; }
  .avail-val { font-size:13px; font-weight:700; white-space:nowrap; }
  .avail-pos  { color:var(--success); }
  .avail-warn { color:var(--warning); }
  .avail-neg  { color:var(--danger); }

  /* ── Edit-Overlay ── */
  .edit-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .edit-overlay.open { display: flex; }
  .edit-box { background: var(--surface); border-radius: var(--radius-lg); padding: 26px 28px; max-width: 340px; width: 90%; box-shadow: var(--shadow-modal); border: 1px solid var(--border); }
  .edit-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .edit-box p  { font-size: 13px; color: var(--text-2); margin-bottom: 16px; }
  .edit-box input { width: 100%; font-size: 22px; font-weight: 700; text-align: center; font-family: var(--font); padding: 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); outline: none; background: var(--surface2); color: var(--text); margin-bottom: 16px; box-sizing: border-box; }

  .edit-box-actions { display: flex; gap: 8px; }
  .edit-box-actions .btn { flex: 1; justify-content: center; }

  /* ── Loading ── */
  .loading-hint { font-size: 14px; color: var(--text-3); text-align: center; padding: 40px 20px; }

    <input type="password" id="pwInput" placeholder="Passwort…" autocomplete="current-password"
      style="width:100%;font-size:15px;padding:11px 14px;border:1.5px solid var(--border,#e0e0e0);border-radius:8px;outline:none;margin-bottom:10px;font-family:inherit;box-sizing:border-box;" />
    <div id="pwError" style="font-size:12px;color:#d93025;margin-bottom:10px;min-height:16px;"></div>
    <button onclick="checkPw()" style="width:100%;background:#0071e3;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Weiter →</button>
  </div>

<script>
(function(){
  const PW = 'Lager2026';
  if(sessionStorage.getItem('externPwOk')==='1'){
    document.getElementById('pwOverlay').style.display='none';
  } else {
    setTimeout(()=>document.getElementById('pwInput').focus(),80);
    document.getElementById('pwInput').addEventListener('keydown',function(e){ if(e.key==='Enter') checkPw(); });
  }
  window.checkPw = function(){
    if(document.getElementById('pwInput').value===PW){
      sessionStorage.setItem('externPwOk','1');
      document.getElementById('pwOverlay').style.display='none';
    } else {
      document.getElementById('pwError').textContent='Falsches Passwort – bitte erneut versuchen';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
    }
  };
})();
</script>

/* ── Helpers ── */
function nowStr() {
  const d = new Date();
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) + ' '
       + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
function setSync(t, txt) {
  const el = document.getElementById('syncIndicator');
  const te = document.getElementById('syncText');
  if(el) el.className = 'sync-indicator ' + t;
  if(te) te.textContent = txt;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, dur=2400) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), dur);
}

/* ── Log-Schreiber ── */
function writeLog(aktion, details) {
  if (!_db) return;
  const ts = Date.now();
  const entry = {
    ts,
    datum:   new Date().toLocaleDateString('de-DE'),
    uhrzeit: new Date().toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' }),
    user:    'Extern',
    aktion,
    details: details || '',
    extern:  true,
    ip:      _clientIp
  };
  _db.ref('logs/' + ts + '_' + Math.random().toString(36).slice(2,5)).set(entry);
}

/* ── Firebase Init ── */
(function initFb(){
  try {
    const app = firebase.initializeApp(FB_CFG);
    _db = firebase.database(app);

    // Katalog laden (moebelKatalog von moebel.html befüllt)
    _db.ref('moebelKatalog').once('value', snapKat => {
      const fbKat = snapKat.val();
      if (fbKat && Array.isArray(fbKat) && fbKat.length > 0) {
        KATEGORIEN = fbKat.map(k => ({
          id:     k.id,
          titel:  k.titel || k.label || k.id,
          emoji:  k.emoji || '📦',
          zeilen: Array.isArray(k.zeilen) ? k.zeilen.map(z => ({ id: z.id, label: z.label })) : []
        }));
      } else {
        // Fallback: hardcodierter Katalog
        KATEGORIEN = KATEGORIEN_DEFAULT.map(k => ({
          id: k.id, titel: k.titel, emoji: k.emoji,
          zeilen: k.zeilen.map(z => ({ id: z.id, label: z.label }))
        }));
      }
      initData();
      startMoebelListener();
      listenToSessions();
    }, () => {
      // Katalog nicht erreichbar → Fallback
      KATEGORIEN = KATEGORIEN_DEFAULT.map(k => ({
        id: k.id, titel: k.titel, emoji: k.emoji,
        zeilen: k.zeilen.map(z => ({ id: z.id, label: z.label }))
      }));
      initData();
      startMoebelListener();
      listenToSessions();
    });
  } catch(e) { setSync('error','Init-Fehler'); console.error(e); }
})();

function initData() {
  KATEGORIEN.forEach(kat => {
    if (!_data[kat.id]) _data[kat.id] = {};
    kat.zeilen.forEach(z => {
      if (!_data[kat.id][z.id]) _data[kat.id][z.id] = { anzahl: 0, updatedAt: '' };
    });
  });
}

function startMoebelListener() {
  _db.ref('moebel').on('value', snap => {
    const fbData = snap.val();
    if (fbData) {
      KATEGORIEN.forEach(kat => {
        if (fbData[kat.id]) {
          kat.zeilen.forEach(z => {
            if (fbData[kat.id][z.id] !== undefined) {
              const fb = fbData[kat.id][z.id];
              if (!_data[kat.id])       _data[kat.id] = {};
              if (!_data[kat.id][z.id]) _data[kat.id][z.id] = { anzahl: 0, updatedAt: '' };
              if (fb.anzahl    != null) _data[kat.id][z.id].anzahl    = fb.anzahl;
              if (fb.updatedAt != null) _data[kat.id][z.id].updatedAt = fb.updatedAt;
            }
          });
        }
      });
    }
    _domBuilt = false;
    renderAll();
    setSync('synced', 'Live ✓');
  }, () => { setSync('error','Firebase Fehler'); renderAll(); });
}

/* ── Render ── */
function renderAll() {
  if (!_domBuilt) buildDOM();
  updateValues();
  renderSummary();
}

function buildDOM() {
  const container = document.getElementById('katContainer');
  if (!container) return;
  container.innerHTML = '';
  KATEGORIEN.forEach(kat => {
    const rows = kat.zeilen.map(z => `
      <tr id="row-ext-${kat.id}-${z.id}">
        <td><span class="fchip">${esc(z.label)}</span></td>
        <td>
          <div class="stepper">
            <button class="s-btn" onclick="change('${kat.id}','${z.id}',-1)">−</button>
            <span class="s-val zero" id="v-${kat.id}-${z.id}" onclick="openEdit('${kat.id}','${z.id}','${esc(z.label)}')" title="Klicken zum direkten Eingeben">0</span>
            <button class="s-btn" onclick="change('${kat.id}','${z.id}',1)">+</button>
          </div>
        </td>
        <td><span class="res-badge none" id="res-${kat.id}-${z.id}">–</span></td>
        <td><span class="avail-val" id="avail-${kat.id}-${z.id}">–</span></td>
        <td><span class="sbadge leer" id="b-${kat.id}-${z.id}">Leer</span></td>
        <td><span class="ts" id="t-${kat.id}-${z.id}">–</span></td>
      </tr>`).join('');

    const card = document.createElement('div');
    card.className = 'kat-card';
    card.innerHTML = `
      <div class="kat-head">
        <span class="kat-emoji">${kat.emoji}</span>
        <span class="kat-title">${esc(kat.titel)}</span>
        <span class="kat-gesamtbadge" id="kat-tot-${kat.id}">–</span>
      </div>
      <div class="tbl-wrap">
        <table class="mtbl">
          <colgroup><col class="c-name"/><col class="c-bestand"/><col class="c-reserviert"/><col class="c-verfuegbar"/><col class="c-status"/><col class="c-ts"/></colgroup>
          <thead><tr>
            <th>Typ / Farbe / Maße</th>
            <th>Bestand <small style="font-weight:400;text-transform:none">(klick = direkt)</small></th>
            <th>Reserviert</th>
            <th>Verfügbar</th>
            <th>Status</th>
            <th>Geändert</th>
          </tr></thead>
          <tbody id="tbody-ext-${kat.id}">${rows}</tbody>
        </table>
      </div>`;
    container.appendChild(card);
  });
  _domBuilt = true;
}

function updateValues() {
  KATEGORIEN.forEach(kat => {
    let total = 0;
    kat.zeilen.forEach(z => {
      const d = (_data[kat.id]||{})[z.id] || { anzahl:0, updatedAt:'' };
      const v = Math.max(0, Number(d.anzahl) || 0);
      total += v;

      const valEl = document.getElementById(`v-${kat.id}-${z.id}`);
      if (valEl) { valEl.textContent = v; valEl.className = 's-val ' + (v > 10 ? 'pos' : v > 0 ? '' : 'zero'); }

      const badgeEl = document.getElementById(`b-${kat.id}-${z.id}`);
      if (badgeEl) {
        if (v === 0)       { badgeEl.className = 'sbadge leer';   badgeEl.textContent = 'Leer'; }
        else if (v <= 5)   { badgeEl.className = 'sbadge mittel'; badgeEl.textContent = 'Wenig (' + v + ')'; }
        else               { badgeEl.className = 'sbadge viel';   badgeEl.textContent = 'OK (' + v + ')'; }
      }

      const tsEl = document.getElementById(`t-${kat.id}-${z.id}`);
      if (tsEl) tsEl.textContent = d.updatedAt || '–';

      const resEl   = document.getElementById(`res-${kat.id}-${z.id}`);
      const availEl = document.getElementById(`avail-${kat.id}-${z.id}`);
      if (resEl) {
        const res = (_reserviert[kat.id] || {})[z.id] || 0;
        if (res > 0) { resEl.textContent = res + ' reserv.'; resEl.className = 'res-badge'; }
        else { resEl.textContent = '–'; resEl.className = 'res-badge none'; }
      }
      if (availEl) {
        const res   = (_reserviert[kat.id] || {})[z.id] || 0;
        const avail = v - res;
        availEl.textContent = avail;
        availEl.className   = 'avail-val ' + (avail < 0 ? 'avail-neg' : avail <= 5 ? 'avail-warn' : 'avail-pos');
      }
    });

    const totEl = document.getElementById(`kat-tot-${kat.id}`);
    if (totEl) totEl.textContent = total + ' gesamt';
  });
}

function renderSummary() {
  let gesamt = 0, leer = 0, wenig = 0;
  KATEGORIEN.forEach(kat => {
    let tot = 0;
    kat.zeilen.forEach(z => { tot += Math.max(0, Number(((_data[kat.id]||{})[z.id]||{}).anzahl) || 0); });
    gesamt += tot;
    if (tot === 0) leer++;
    else if (tot <= 10) wenig++;
  });
  const strip = document.getElementById('summaryStrip');
  if (!strip) return;
  strip.innerHTML = `
    <div class="sum-card ok"><div class="s-lbl">Gesamt Artikel</div><div class="s-num">${gesamt}</div><div class="s-sub">verfügbar</div></div>
    <div class="sum-card"><div class="s-lbl">Kategorien</div><div class="s-num">${KATEGORIEN.length}</div><div class="s-sub">Möbeltypen</div></div>
    <div class="sum-card ${wenig>0?'warn':''}"><div class="s-lbl">Wenig Bestand</div><div class="s-num">${wenig}</div><div class="s-sub">Kategorien ≤ 10 Stk.</div></div>
    <div class="sum-card ${leer>0?'warn':''}"><div class="s-lbl">Leer</div><div class="s-num">${leer}</div><div class="s-sub">Kategorien = 0</div></div>
  `;
}

/* ── Bestand ändern ── */
function change(katId, zeilId, delta) {
  if (!_data[katId])        _data[katId] = {};
  if (!_data[katId][zeilId]) _data[katId][zeilId] = { anzahl:0, updatedAt:'' };

  const oldVal = Number(_data[katId][zeilId].anzahl) || 0;
  const newVal = Math.max(0, oldVal + delta);
  _data[katId][zeilId].anzahl    = newVal;
  _data[katId][zeilId].updatedAt = nowStr();

  // Track net change for batch log on save (only capture oldVal once per item)
  const key = katId + '/' + zeilId;
  if (!_pendingLogs[key]) {
    const kat = KATEGORIEN.find(k => k.id === katId);
    const z   = kat ? kat.zeilen.find(z => z.id === zeilId) : null;
    _pendingLogs[key] = {
      katLabel: kat ? kat.titel : katId,
      zLabel:   z   ? z.label   : zeilId,
      oldVal
    };
  }

  updateValues();
  renderSummary();
  scheduleSave();
}

function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(save, 800);
}

/* ── Session-Listener für Reservierungsanzeige ── */
function listenToSessions() {
  if (!_db) return;
  _db.ref('sessions').on('value', snap => {
    const all = snap.val();
    const newRes = {};
    if (all) {
      Object.values(all).forEach(session => {
        if (!session || !session.personen) return;
        session.personen.forEach(p => {
          if (!p || !['Offen','Reservierung','Abholung'].includes(p.status)) return;
          if (!Array.isArray(p.moebel)) return;
          p.moebel.forEach(m => {
            if (!m || !m.kat || !m.sub || !(m.qty > 0)) return;
            if (!newRes[m.kat]) newRes[m.kat] = {};
            newRes[m.kat][m.sub] = (newRes[m.kat][m.sub] || 0) + m.qty;
          });
        });
      });
    }
    _reserviert = newRes;
    updateValues();
  });
}

function save() {
  if (!_db) return;
  setSync('syncing', 'Speichern…');

  // Nur anzahl + updatedAt granular schreiben – notiz von moebel.html bleibt erhalten
  const updates = {};
  Object.keys(_pendingLogs).forEach(key => {
    const [katId, zeilId] = key.split('/');
    const d = (_data[katId]||{})[zeilId];
    if (d) {
      updates['moebel/' + katId + '/' + zeilId + '/anzahl']    = d.anzahl;
      updates['moebel/' + katId + '/' + zeilId + '/updatedAt'] = d.updatedAt;
    }
  });

  const logsToWrite = Object.assign({}, _pendingLogs);
  _pendingLogs = {};

  _db.ref('/').update(updates)
    .then(() => {
      setSync('synced', 'Gespeichert ✓');
      // Log every net change
      Object.keys(logsToWrite).forEach(key => {
        const [katId, zeilId] = key.split('/');
        const { katLabel, zLabel, oldVal } = logsToWrite[key];
        const newVal = ((_data[katId]||{})[zeilId]||{}).anzahl ?? oldVal;
        const diff   = newVal - oldVal;
        if (diff !== 0) {
          const sign = diff > 0 ? '+' : '';
          writeLog('Bestand geändert', `${katLabel} – ${zLabel}: ${oldVal} → ${newVal} (${sign}${diff})`);
        }
      });
      toast('Gespeichert ✓');
    })
    .catch(e => { setSync('error','Fehler'); console.error(e); });
}

/* ── Direkteingabe Modal ── */
let _editKat = null, _editZeil = null, _editOldVal = null;
function openEdit(katId, zeilId, label) {
  _editKat = katId; _editZeil = zeilId;
  _editOldVal = ((_data[katId]||{})[zeilId]||{}).anzahl || 0;
  document.getElementById('editTitle').textContent = label + ' — Bestand';
  document.getElementById('editSub').textContent   = 'Aktuell: ' + _editOldVal;
  const inp = document.getElementById('editInput');
  inp.value = _editOldVal;
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(() => { inp.focus(); inp.select(); }, 80);
}
function closeEdit() {
  document.getElementById('editOverlay').classList.remove('open');
  _editKat = null; _editZeil = null; _editOldVal = null;
}
function confirmEdit() {
  if (!_editKat || !_editZeil) return;
  const newVal = Math.max(0, parseInt(document.getElementById('editInput').value) || 0);
  if (!_data[_editKat])        _data[_editKat] = {};
  if (!_data[_editKat][_editZeil]) _data[_editKat][_editZeil] = { anzahl:0, updatedAt:'' };

  const oldVal = Number(_data[_editKat][_editZeil].anzahl) || 0;
  _data[_editKat][_editZeil].anzahl    = newVal;
  _data[_editKat][_editZeil].updatedAt = nowStr();

  const key = _editKat + '/' + _editZeil;
  if (!_pendingLogs[key]) {
    const kat = KATEGORIEN.find(k => k.id === _editKat);
    const z   = kat ? kat.zeilen.find(z => z.id === _editZeil) : null;
    _pendingLogs[key] = {
      katLabel: kat ? kat.titel : _editKat,
      zLabel:   z   ? z.label   : _editZeil,
      oldVal
    };
  }

  updateValues();
  renderSummary();
  scheduleSave();
  closeEdit();
}

document.getElementById('editInput').addEventListener('keydown', e => {
  if (e.key === 'Enter')  confirmEdit();
  if (e.key === 'Escape') closeEdit();
});
document.getElementById('editOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('editOverlay')) closeEdit();
});
</script>
